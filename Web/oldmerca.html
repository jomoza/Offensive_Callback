<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEAL YOURSELF</title>
  <link rel="stylesheet" href="/web/assets/css/index.css">
  <script src="../web/assets/js/merch.js"></script>

  <style>
    body {
      background: radial-gradient(ellipse at center, #000000 0%, #0f0f0f 100%);
      font-family: 'Courier New', Courier, monospace;
      cursor: url('https://cur.cursors-4u.net/others/oth-5/oth492.cur'), auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1.glitch-title {
      font-size: 3em;
      text-align: center;
      color: #00ff9f;
      animation: glitch 1.5s infinite linear;
      margin-bottom: 20px;
    }

    @keyframes glitch {
      2%,64%{ transform: translate(2px,0) skew(0deg); }
      4%,60%{ transform: translate(-2px,0) skew(0deg); }
      62%{ transform: translate(0,0) skew(5deg); }
    }

    h1.glitch-title:before,
    h1.glitch-title:after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      width: 100%;
      height: 100%;
    }

    h1.glitch-title:before {
      animation: glitch-top 1.5s infinite linear;
      clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
      -webkit-clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
    }

    @keyframes glitch-top {
      2%,64%{ transform: translate(2px,-2px); }
      4%,60%{ transform: translate(-2px,2px); }
      62%{ transform: translate(13px,-1px) skew(-13deg); }
    }

    h1.glitch-title:after {
      animation: glitch-bottom 1.5s infinite linear;
      clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%);
      -webkit-clip-path: polygon(0 67%, 100% 67%, 100% 100%, 0 100%);
    }

    @keyframes glitch-bottom {
      2%,64%{ transform: translate(-2px,0); }
      4%,60%{ transform: translate(-2px,0); }
      62%{ transform: translate(-22px,5px) skew(21deg); }
    }

    .explanation-box {
      max-width: 600px;
      text-align: center;
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      line-height: 1.8;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(0,255,159,0.2);
      padding: 20px;
      border-radius: 4px;
      box-shadow: 0 0 15px rgba(0,255,159,0.1);
    }

    .explanation-box p {
      margin: 0;
    }

    .matrix-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      opacity: 0.05;
    }

    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 5px;
      font-size: 10px;
      background-color: rgba(0,255,159,0.1);
      border-top: 1px solid rgba(0,255,159,0.2);
      font-family: monospace;
      text-align: center;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>

<body>

  <div class="matrix-bg"></div>

  <h1 class="glitch-title" data-text="DEAL YOURSELF">DEAL YOURSELF</h1>

  <div class="explanation-box">
    <p>
      Connection established. Initializing data exfiltration and browser fingerprinting sequence.
      All client-side telemetry is being collected and transmitted to the C2 server.
    </p>
  </div>

  <div class="status-bar">[ Status: Payload active :: Awaiting instructions... ]</div>

  <noscript>
    <img src="/dealer/1.png?unjs=true&u=img-ping&b=NOSCRIPT" style="display:none">
    <style>
        /* The CSS tracking via @font-face and @supports will still work in the background */
        @font-face { font-family: 'Ubuntu'; src: local('Ubuntu'), url('/dealer/1.png?unjs=true&u=cssTracking(ubuntu)&b=NOSCRIPT-DETECTED') format('truetype'); }
        @font-face { font-family: 'Calibri'; src: local('Calibri'), url('/dealer/1.png?unjs=true&u=cssTracking(Linux)&b=NOSCRIPT-DETECTED') format('truetype'); }
        @font-face { font-family: 'MS UI Gothic'; src: local('Roboto'), url('/dealer/1.png?unjs=true&u=cssTracking(Windows)&b=NOSCRIPT-DETECTED') format('truetype'); }
        @supports(-webkit-app-region: inherit) { .badboy { background: url('/dealer/kid.png?unjs=true&u=cssTracking(ChromeBasedBrowser)&b=NOSCRIPT-DETECTED') } }
        @supports(-moz-appearance: inherit) { .badboy { background: url('/dealer/kid.png?unjs=true&u=cssTracking(FirefoxBasedBrowser)&b=NOSCRIPT-DETECTED') } }
        @supports(-apple-pay-button-style: inherit) { .badboy { background: url('/dealer/kid.png?unjs=true&u=cssTracking(cssWebkit)&b=NOSCRIPT-DETECTED') } }
        @supports(-webkit-touch-callout: inherit) { .badboy { background: url('/dealer/kid.png?unjs=true&u=cssTracking(cssMobileWebkit)&b=NOSCRIPT-DETECTED') } }
        @supports(-moz-osx-font-smoothing: inherit) { .badboy { background: url('/dealer/kid.png?unjs=true&u=cssTracking(cssMacGecko)&b=NOSCRIPT-DETECTED') } }
    </style>
    <div class="badboy" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
        <h1 class="glitch-title" data-text="JAVASCRIPT DISABLED">JAVASCRIPT DISABLED</h1>
        <div class="explanation-box">
            <p>Passive reconnaissance mode activated. Your browser has disabled JavaScript, but telemetry is still being collected through alternative methods.</p>
        </div>
    </div>
  </noscript>

</body>
</html>
