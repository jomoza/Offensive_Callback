<!DOCTYPE html>
<html lang="en">
<head>
    <title>5ELG - Live Traffic</title>
    <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/index.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <style>
        /* ── toolbar ── */
        .cb-toolbar {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin: 14px 0 10px;
        }
        .cb-toolbar-group {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border: 1px solid rgba(255,255,255,.07);
            border-radius: 4px;
            background: rgba(255,255,255,.02);
        }
        .cb-toolbar-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: rgba(255,255,255,.3);
            margin-right: 3px;
        }
        .fpill {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border: 1px solid currentColor;
            border-radius: 3px;
            font-size: 10px;
            cursor: pointer;
            user-select: none;
            opacity: .32;
            transition: opacity .12s;
        }
        .fpill.on  { opacity: 1; }
        .fpill input { display: none; }
        .fpill .pdot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink:0; }

        /* Proto pills */
        .fpill-http  { color: #3ecf8e; }
        .fpill-ws    { color: #a78bfa; }
        .fpill-dns   { color: #4f8ef7; }
        .fpill-icmp  { color: #f0a429; }
        /* Human/bot pills */
        .fpill-human { color: #f472b6; }
        .fpill-bot-maybe { color: #ffd070; }
        .fpill-bot-confirm { color: #ff8080; }
        /* Fingerprint pills */
        .fpill-fu    { color: #5fffb0; }
        .fpill-nofu  { color: rgba(255,255,255,.4); }
        /* Dealer pills */
        .fpill-proxy   { color: #ce93d8; }
        .fpill-imgping { color: #ffeb3b; }
        .fpill-custom  { color: #80cbc4; }

        .cb-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            opacity: .75;
        }
        .live-badge { display: inline-flex; align-items: center; gap: 5px; }
        .live-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #3ecf8e;
            animation: lp 1.8s ease-in-out infinite;
        }
        @keyframes lp { 0%,100%{opacity:1} 50%{opacity:.15} }

        /* ── table ── */
        #logsTable {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
        }
        #logsTable thead tr { border-bottom: 1px solid rgba(255,255,255,.15); }
        #logsTable th {
            padding: 5px 6px;
            text-align: left;
            font-size: 9px;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: rgba(255,255,255,.4);
            white-space: nowrap;
            font-weight: 700;
        }
        /* col widths */
        .col-arrow  { width: 18px; }
        .col-id     { width: 36px; white-space:nowrap; }
        .col-ip     { width: 112px; white-space:nowrap; }
        .col-proto  { width: 52px; text-align:center; white-space:nowrap; }
        .col-method { width: 52px; text-align:center; white-space:nowrap; }
        .col-ua     { min-width:160px; max-width:280px; overflow:hidden; text-overflow:ellipsis; }
        .col-len    { width: 42px; text-align:right; white-space:nowrap; }
        .col-ts     { width: 88px; white-space:nowrap; }
        .col-dl     { width: 100px; white-space:nowrap; }
        .col-fu-hash{ width: 170px; }
        .col-params { width: 44px; text-align:center; white-space:nowrap; }
        .col-bot    { width: 28px; text-align:center; white-space:nowrap; }
        .col-os     { width: 24px; text-align:center; white-space:nowrap; }
        .col-br     { width: 24px; text-align:center; white-space:nowrap; }
        .col-threat { width: 50px; white-space:nowrap; }

        /* log rows */
        .log-row {
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,.045);
            transition: background .1s;
        }
        .log-row:hover  { background: rgba(255,255,255,.04); }
        .log-row.r-open { background: rgba(255,255,255,.055); }
        .log-row.r-bot-dim        { opacity: .28; }
        .log-row.r-bot-dim:hover  { opacity: .8; }
        .log-row.r-bot-dim.r-open { opacity: 1; }

        /* detail row */
        .detail-row { border-bottom: 1px solid rgba(255,255,255,.07); pointer-events: none; }
        .detail-row > td { padding: 0 !important; overflow: visible !important; pointer-events: all !important; }
        .detail-inner * { pointer-events: all; }

        #logsTable td {
            padding: 4px 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            vertical-align: middle;
            font-size: 11px;
            color: rgba(255,255,255,.88);
        }
        #logsTable .detail-row td { padding: 0; white-space: normal; overflow: visible; }

        .r-arrow { font-size: 9px; color: rgba(255,255,255,.25); display: inline-block; transition: transform .14s; }
        .r-open .r-arrow { transform: rotate(90deg); color: rgba(255,255,255,.65); }

        /* badges */
        .badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 700; letter-spacing: .04em; line-height: 1.75; }
        .b-get  { background: rgba(62,207,142,.15); color: #5fffb0; }
        .b-post { background: rgba(240,164,41,.15);  color: #ffd070; }
        .b-dns  { background: rgba(79,142,247,.15);  color: #7eb8ff; }
        .b-icmp { background: rgba(242,96,96,.15);   color: #ff8080; }
        .b-ws   { background: rgba(167,139,250,.15); color: #c4b0ff; }

        /* IP status dot */
        .ip-known   { display:inline-block;width:7px;height:7px;border-radius:50%;background:#5fffb0;flex-shrink:0; }
        .ip-unknown { display:inline-block;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);flex-shrink:0; }
        .ip-loading { display:inline-block;width:7px;height:7px;border-radius:50%;background:#ffd070;flex-shrink:0;animation:lp 1s infinite; }

        /* ip */
        .ip-link { font-weight: 700; color: #fff; cursor: pointer; text-decoration: underline dotted rgba(255,255,255,.3); text-underline-offset: 2px; font-family: Consolas,Menlo,monospace; font-size: 10px; }
        .ip-link:hover { color: #7eb8ff; }

        /* UA column */
        .ua-val { font-size: 10px; color: rgba(255,255,255,.6); }
        .ua-bot { color: #ff8080; }
        .ua-human { color: rgba(255,255,255,.65); }

        /* bot indicator */
        .bot-icon { font-size: 11px; }

        /* fu indicator */
        .fu-dot-yes { display:inline-block;width:7px;height:7px;border-radius:50%;background:#5fffb0; }
        .fu-dot-no  { display:inline-block;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.15); }

        /* dealer */
        .dl-val { font-size: 10px; color: rgba(255,255,255,.7); }

        /* timestamp */
        .ts-val { font-size: 10px; color: rgba(255,255,255,.6); }

        /* ── search + pagination bar ── */
        .cb-searchbar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
        .cb-searchbar input { padding: 4px 10px; font-size: 12px; border: 1px solid rgba(255,255,255,.15); border-radius: 3px; background: rgba(255,255,255,.04); color: #fff; width: 240px; outline: none; }
        .cb-searchbar input:focus { border-color: rgba(255,255,255,.35); }
        .cb-searchbar input::placeholder { color: rgba(255,255,255,.22); }
        .cb-ps-wrap { display:flex; align-items:center; gap:6px; font-size:11px; color:rgba(255,255,255,.4); }
        .cb-ps-wrap select { padding:2px 6px; font-size:11px; border:1px solid rgba(255,255,255,.18); border-radius:3px; background:rgba(255,255,255,.05); color:#fff; cursor:pointer; outline:none; }
        .cb-count { font-size:11px; color:rgba(255,255,255,.32); margin-left:auto; }
        .cb-pg-bar { display:flex; align-items:center; justify-content:space-between; padding:6px 0 2px; font-size:11px; color:rgba(255,255,255,.35); flex-wrap:wrap; gap:6px; }
        .cb-pg-pages { display:flex; align-items:center; gap:3px; }
        .cb-pg-btn { display:inline-flex; align-items:center; justify-content:center; min-width:24px; height:20px; padding:0 4px; border:1px solid rgba(255,255,255,.12); border-radius:3px; font-size:11px; cursor:pointer; background:transparent; color:rgba(255,255,255,.6); transition:all .1s; }
        .cb-pg-btn:hover:not(:disabled) { background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.3); color:#fff; }
        .cb-pg-btn.active { background:rgba(126,184,255,.15); border-color:rgba(126,184,255,.5); color:#7eb8ff; font-weight:700; }
        .cb-pg-btn:disabled { opacity:.25; cursor:default; }
        .cb-pg-ellipsis { font-size:11px; color:rgba(255,255,255,.3); padding:0 2px; }

        /* ── column resizer ── */
        #logsTable th { position: relative; }
        .col-resizer { position: absolute; right:0; top:0; width:4px; height:100%; cursor: col-resize; user-select: none; z-index:1; }
        .col-resizer:hover, .col-resizer.resizing { background: rgba(126,184,255,.4); }

        /* ── detail panel ── */
        .det-flat { background:#000; padding:0; }
        .det-section-bar { display:flex; align-items:center; gap:6px; padding:5px 14px; background:rgba(255,255,255,.02); border-bottom:1px solid rgba(255,255,255,.05); font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.3); }
        .det-section-bar .dsb-dot { width:5px;height:5px;border-radius:50%;flex-shrink:0; }
        .det-block { display:grid; grid-template-columns:repeat(4,1fr); gap:5px 20px; padding:8px 14px 10px; border-bottom:1px solid rgba(255,255,255,.04); }
        .det-block.cols2 { grid-template-columns:repeat(2,1fr); }
        .det-block.cols6 { grid-template-columns:repeat(6,1fr); }
        .det-block.full1 { grid-template-columns:1fr; }
        .det-field { display:flex; flex-direction:column; gap:1px; min-width:0; }
        .det-field.span2 { grid-column:span 2; }
        .det-field.span4 { grid-column:1/-1; }
        .det-lbl { font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.28); }
        .det-val { font-size:11px;color:rgba(255,255,255,.82);word-break:break-all; }
        .det-val.mono { font-family:Consolas,Menlo,monospace;font-size:10px;color:#7eb8ff; }
        .det-val.dim  { color:rgba(255,255,255,.42); }
        .det-val.green { color:#5fffb0; }
        .det-val.amber { color:#ffd070; }
        .det-val.red   { color:#ff8080; }
        .det-val.purple { color:#c4b0ff; }
        .det-params-table { width:100%;border-collapse:collapse; }
        .det-params-table td { padding:3px 6px;font-size:11px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top; }
        .det-params-table td:first-child { font-size:10px;font-weight:600;color:rgba(255,255,255,.35);white-space:nowrap;width:180px;text-transform:uppercase;letter-spacing:.04em; }
        .det-params-table td:last-child { color:rgba(255,255,255,.75);word-break:break-all; }
        .det-params-table tr:last-child td { border-bottom:none; }
        .det-actions-row { display:flex; gap:6px; align-items:center; padding:7px 14px; background:rgba(255,255,255,.015); border-bottom:1px solid rgba(255,255,255,.05); flex-wrap:wrap; }
        .det-tag { display:inline-block; padding:1px 7px; border-radius:3px; font-size:10px; font-weight:700; background:rgba(255,255,255,.06); color:rgba(255,255,255,.6); margin:1px 2px 1px 0; }
        .threat-bar { height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin-top:4px; }
        .threat-fill { height:100%;border-radius:2px; }
        .det-ip-known { color:#5fffb0; font-size:10px; font-weight:700; }
        .det-ip-unknown { color:rgba(255,255,255,.35); font-size:10px; }

        /* OS/BR cols defined above */
        .col-threat { width: 52px; }

        /* ── Threat badges (table) ── */
        .t-high   { display:inline-block;padding:1px 6px;border-radius:2px;font-size:9px;font-weight:700;background:rgba(200,112,112,.2);color:#c87070;letter-spacing:.06em; }
        .t-medium { display:inline-block;padding:1px 6px;border-radius:2px;font-size:9px;font-weight:700;background:rgba(144,144,176,.2);color:#9090b0;letter-spacing:.06em; }
        .t-low    { display:inline-block;padding:1px 6px;border-radius:2px;font-size:9px;font-weight:700;background:rgba(95,255,176,.1);color:#5fffb0;letter-spacing:.06em; }

        /* ── Detail panel: two-column layout ── */
        .det-two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            border-bottom: 1px solid rgba(255,255,255,.05);
            min-width: 0;
            overflow: hidden;
        }
        .det-col {
            padding: 10px 14px 12px;
            min-width: 0;
            overflow: hidden;
            word-break: break-word;
        }
        .det-col:first-child { border-right: 1px solid rgba(255,255,255,.06); }
        .det-col-head {
            font-size: 9px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
            color: rgba(255,255,255,.28); margin-bottom: 8px;
            display: flex; align-items: center; gap: 5px;
        }
        .det-col-head .dch-dot { width:4px;height:4px;border-radius:50%;flex-shrink:0; }
        .det-kv { display:flex; flex-direction:column; gap:2px; margin-bottom:7px; }
        .det-kv-label { font-size:9px; text-transform:uppercase; letter-spacing:.07em; color:rgba(255,255,255,.25); }
        .det-kv-val   { font-size:11px; color:rgba(255,255,255,.82); word-break:break-all; line-height:1.4; }
        .det-kv-val.mono { font-family:Consolas,Menlo,monospace;font-size:10px;color:#7eb8ff; }
        .det-kv-val.dim  { color:rgba(255,255,255,.4); }
        .det-kv-val.green { color:#5fffb0; font-weight:700; }
        .det-kv-val.red   { color:#ff8080; font-weight:700; }
        .det-kv-val.amber { color:#ffd070; font-weight:700; }
        .det-kv-val.purple { color:#c4b0ff; }

        /* FU card in detail */
        .fu-card {
            background: rgba(95,255,176,.04);
            border: 1px solid rgba(95,255,176,.15);
            border-radius: 4px;
            padding: 8px 10px;
            margin-bottom: 8px;
        }
        .fu-card.no-fu {
            background: rgba(255,128,128,.03);
            border-color: rgba(255,128,128,.12);
        }
        .fu-card-title {
            font-size: 9px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase;
            color: #5fffb0; margin-bottom: 5px; display:flex; align-items:center; gap:5px;
        }
        .fu-card.no-fu .fu-card-title { color:#ff8080; }
        .fu-hash { font-family:Consolas,Menlo,monospace; font-size:9px; color:#7eb8ff; word-break:break-all; line-height:1.5; }

        /* IP card in detail */
        .ip-card {
            border-radius:4px; padding:8px 10px; margin-bottom:8px;
        }
        .ip-card.ip-in-db { background:rgba(95,255,176,.05); border:1px solid rgba(95,255,176,.2); }
        .ip-card.ip-not-db { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); }
        .ip-card-title { font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;margin-bottom:4px; }
        .ip-card.ip-in-db .ip-card-title { color:#5fffb0; }
        .ip-card.ip-not-db .ip-card-title { color:rgba(255,255,255,.3); }

        /* Bot card in detail */
        .bot-card { border-radius:4px; padding:8px 10px; margin-bottom:8px; }
        .bot-card.bc-human  { background:rgba(95,255,176,.04); border:1px solid rgba(95,255,176,.18); }
        .bot-card.bc-likely { background:rgba(255,208,112,.04); border:1px solid rgba(255,208,112,.18); }
        .bot-card.bc-bot    { background:rgba(255,128,128,.04); border:1px solid rgba(255,128,128,.18); }
        .bot-card-title { font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;margin-bottom:4px; }
        .bc-human .bot-card-title  { color:#5fffb0; }
        .bc-likely .bot-card-title { color:#ffd070; }
        .bc-bot .bot-card-title    { color:#ff8080; }

        /* Headers in detail - div based, no table overflow issues */
        .hdr-wrap { width:100%; overflow:hidden; min-width:0; }
        .hdr-scroll { max-height:220px; overflow-y:auto; overflow-x:hidden; }
        .hdr-row { display:flex; gap:8px; padding:3px 0; border-bottom:1px solid rgba(255,255,255,.04); font-size:10px; min-width:0; }
        .hdr-row:last-child { border-bottom:none; }
        .hdr-key { flex-shrink:0; width:160px; min-width:0; color:#7eb8ff; font-weight:600; font-size:9px; text-transform:uppercase; letter-spacing:.04em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding-top:1px; }
        .hdr-val { flex:1; min-width:0; color:rgba(255,255,255,.65); word-break:break-all; overflow-wrap:anywhere; line-height:1.4; }
        /* POST body params - div based too */
        .post-body-section { background:rgba(255,208,112,.04); border-bottom:1px solid rgba(255,208,112,.15); padding:10px 14px 12px; }
        .post-body-title { font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#ffd070;margin-bottom:8px;display:flex;align-items:center;gap:6px; }
        .post-param-row { display:flex; gap:12px; padding:5px 0; border-bottom:1px solid rgba(255,255,255,.06); min-width:0; }
        .post-param-row:last-child { border-bottom:none; }
        .post-param-key { flex-shrink:0; width:160px; min-width:0; font-size:10px; font-weight:700; color:#ffd070; text-transform:uppercase; letter-spacing:.04em; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding-top:1px; }
        .post-param-val { flex:1; min-width:0; font-family:Consolas,Menlo,monospace; font-size:11px; color:rgba(255,255,255,.88); word-break:break-all; overflow-wrap:anywhere; line-height:1.5; }
    </style>
</head>

<script>
(function(){
    var p=location.pathname;
    var a=p.includes('/callback')?'nav-callback'
         :p.includes('/dashboard')||p.includes('/browsers')?'nav-browsers'

<div style="margin-bottom:14px;padding:7px 13px;background:rgba(196,176,255,.03);border:1px solid rgba(196,176,255,.12);border-radius:5px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="font-size:9px;color:#c4b0ff;font-weight:700;letter-spacing:.12em;text-transform:uppercase;flex:1">◈ Server Callback &amp; Telemetry</span>

        <button onclick="showCodeExample()" style="padding:2px 8px;font-size:9px;border:1px solid rgba(196,176,255,.25);border-radius:3px;background:transparent;color:#c4b0ff;cursor:pointer;font-family:Consolas,monospace;letter-spacing:.06em;flex-shrink:0">CODE</button>
    </div>

</div>


    <!-- ── live traffic chart ── -->
    <div style="margin-bottom:12px;padding:10px 14px 8px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.07);border-radius:4px">
        <div style="display:flex;align-items:center;margin-bottom:7px">
            <span style="font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.28);flex:1">◎ Live Traffic · last 60 min</span>
            <span style="font-size:8px;color:rgba(255,255,255,.22);display:flex;gap:12px">
                <span style="display:inline-flex;align-items:center;gap:3px"><span style="width:7px;height:7px;border-radius:1px;background:rgba(95,255,176,.7);display:inline-block"></span>Human</span>

    function parseReq(er) { try { return JSON.parse(atob(er)); } catch(e) { return {}; } }

    function getProto(log, req) {
        const dl = (log.Dl || '').toUpperCase();
        if (dl.includes('ICMP')) return 'icmp';
        if (dl.includes('DNS'))  return 'dns';
        if (dl.includes('WS') || (req.method && req.method.startsWith('WS'))) return 'ws';
        return 'http';
    }

    function hasFu(log) {
        return log.Fu && log.Fu !== '' && log.Fu !== 'N/B' && log.Fu !== 'PHP-SINGLE-REQUEST';
    }

    /* ── Bot classification: 3 levels ── */
    // Returns: 'human' | 'likely' | 'bot'
    const BOT_RE_HARD = /censys|shadowserver|masscan|shodan|zgrab|nmap|scanner|masscan|internetmeasurement|netcraft|qualys|tenable|pingscan|portscan|binaryedge|bitsight|intrinsec/i;
    const BOT_RE_UA   = /go-http|python-|curl\/|wget\/|scrapy|libwww|java\/|okhttp|axios|node-fetch|got\/|undici|httpie|insomnia|postman|pycurl|aiohttp|requests\/|httpx/i;
    const BOT_RE_CRAWLER = /bot\b|crawl|spider|slurp|bingbot|googlebot|yandex|baiduspider|duckduck|archive\.org|ia_archiver|facebookexternalhit|twitterbot|linkedinbot|semrush|ahrefsbot|majestic|rogerbot|dotbot|exabot|gigabot|mj12bot|blexbot|seekbot/i;
    const BOT_RE_SCANNER = /nessus|acunetix|nikto|openvas|nuclei|burpsuite|sqlmap|w3af|dirbuster|gobuster|ffuf|wfuzz|zap\/|hydra|medusa|netcat/i;

    function classifyBot(log, req) {
        const ua = log.Ua || '';
        if (!ua || ua === 'N/A' || ua === '') return 'bot'; // no UA at all = confirmed bot
        if (BOT_RE_HARD.test(ua))    return 'bot';
        if (BOT_RE_SCANNER.test(ua)) return 'bot';
        if (BOT_RE_CRAWLER.test(ua)) return 'bot';
        if (BOT_RE_UA.test(ua))      return 'bot';
        // Likely bot: has UA but suspicious
        const hasFP = hasFu(log);
        const isOldUA = /Chrome\/(10[0-5]|[1-9][0-9]|[0-9])\./i.test(ua); // very old Chrome
        const fakeUA = /Chrome\/108\.0\.0\.0.*Safari\/537\.36$/.test(ua) && !hasFP; // common fake UA without fingerprint
        if (!hasFP && req.method === 'GET' && !req.headers?.['accept-language']) return 'likely';
        if (fakeUA) return 'likely';
        if (isOldUA && !hasFP) return 'likely';
        return 'human';
    }

    function botIcon(level) {
        if (level === 'bot')    return '<span class="bot-icon" title="Confirmed Bot" style="color:#ff8080">🤖</span>';
        if (level === 'likely') return '<span class="bot-icon" title="Likely Bot" style="color:#ffd070">⚠</span>';
        return '<span class="bot-icon" title="Human" style="color:#5fffb0">👤</span>';
    }

    function fmtTime(ts) {
        try {
            const d = /^\d{13,}/.test(ts) ? new Date(+ts) : new Date(ts);
            if (isNaN(d)) return ts ? ts.slice(0,16) : '—';
            const day   = String(d.getDate()).padStart(2,'0');
            const month = d.toLocaleDateString('en-GB',{month:'short'});
            const time  = [d.getHours(), d.getMinutes(), d.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
            return `<span style="font-size:9px;color:rgba(255,255,255,.35)">${day} ${month}</span> ${time}`;
        } catch(e) { return '—'; }
    }

    function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function protoBadge(proto) {
        const map = { http:'b-get HTTP', ws:'b-ws WS', dns:'b-dns DNS', icmp:'b-icmp ICMP' };
        const v = (map[proto]||'b-get HTTP').split(' ');
        return `<span class="badge ${v[0]}">${v[1]}</span>`;
    }
    function methodBadge(proto, method) {
        if (proto==='dns')  return `<span class="badge b-dns">DNS</span>`;
        if (proto==='icmp') return `<span class="badge b-icmp">ICMP</span>`;
        if (proto==='ws')   return `<span class="badge b-ws">${esc(method||'WS')}</span>`;
        const m = (method||'GET').toUpperCase();
        return `<span class="badge ${m==='POST'?'b-post':'b-get'}">${m}</span>`;
    }

    function renderRequestDetails(req) {
        const lines = [];
        const method = (req.method||'GET').toUpperCase();
        const url = req.url || req.requestURL || '/';
        const httpVer = req.protocol === 'ws' || req.protocol === 'wss' ? 'WebSocket/1.1' : 'HTTP/1.1';
        lines.push(`<span style="color:#5fffb0;font-weight:700">${esc(method)}</span> <span style="color:#fff">${esc(url)}</span> <span style="color:rgba(255,255,255,.3)">${esc(httpVer)}</span>`);

        const headers = req.headers && typeof req.headers === 'object' ? req.headers : {};
        const proxyEnv = {};
        const normalHeaders = {};
        Object.entries(headers).forEach(([key, value]) => {
            if (!key) return;
            const k = String(key);
            const upper = k.toUpperCase();
            if (/^(HTTP_|SCRIPT_|REQUEST_|SERVER_|REMOTE_|DOCUMENT_ROOT|CONTEXT_|FCGI_|PHP_|SSL_|HTTPS|GATEWAY_INTERFACE|REQUEST_SCHEME|PHP_SELF|PATH_INFO|SCRIPT_URI|SERVER_SOFTWARE|SERVER_SIGNATURE)$/.test(upper)) {
                proxyEnv[k] = value;
            } else {
                normalHeaders[k] = value;
            }
        });

        const renderPairs = (section, map) => {
            if (!Object.keys(map).length) return;
            lines.push('');
            lines.push(`<span style="color:#ffd070;font-weight:700">${esc(section)}</span>`);
            Object.keys(map).sort((a,b)=>a.localeCompare(b)).forEach(key => {
                const val = map[key];
                lines.push(`<span style="color:#7eb8ff">${esc(key)}</span><span style="color:rgba(255,255,255,.2)">: </span><span style="color:rgba(255,255,255,.65)">${esc(String(val||'')).replace(/\n/g,'\\n')}</span>`);
            });
        };

        renderPairs('Headers', normalHeaders);
        renderPairs('Proxy / CGI Env', proxyEnv);

        if (req.body) {
            lines.push('');
            const body = typeof req.body === 'string' ? req.body : JSON.stringify(req.body, null, 2);
            lines.push(`<span style="color:#c4b0ff;font-weight:700">Body</span>`);
            lines.push(`<span style="color:rgba(255,255,255,.7)">${esc(body)}</span>`);
        }
        return lines;
    }

    function detectLang(log, req) {
        if (log.Jd) { try { const jd=JSON.parse(atob(log.Jd)); const langs=jd.deviceData?.languages; if(langs&&langs.length)return langs[0].split('-')[0].toUpperCase(); } catch(_){} }
        const al = req.headers?.['Accept-Language'] || req.headers?.['accept-language'] || '';
        if (al) { const m=al.match(/^([a-zA-Z]{2,3})/); if(m)return m[1].toUpperCase(); }
        return '';
    }

    /* truncate UA for display — DNS-aware */
    function truncateUA(ua, maxLen=40, log=null) {
        const req = log ? parseReq(log.Er) : {};
        const proto = log ? (()=>{
            const dl=(log.Dl||'').toUpperCase();
            if(dl.includes('ICMP'))return'icmp';
            if(dl.includes('DNS'))return'dns';
            if(dl.includes('WS'))return'ws';
            return'http';
        })() : 'http';

        // DNS — show record type + queried name
        if (proto === 'dns') {
            try {
                const q = req.questions && req.questions[0];
                if (q) {
                    const typeBadge = q.type
                        ? `<span style="display:inline-block;padding:0 4px;border-radius:2px;font-size:9px;font-weight:700;background:rgba(79,142,247,.15);color:#7eb8ff;margin-right:4px">${esc(q.type)}</span>`
                        : '';
                    const name = q.name || req.merca_uri || '—';
                    return `${typeBadge}<span style="font-family:Consolas,monospace;font-size:10px;color:#c4b0ff" title="${esc(name)}">${esc(name.length>50?name.slice(0,50)+'…':name)}</span>`;
                }
            } catch(_) {}
            const domain = req.merca_uri || log.Fu || '';
            return `<span style="font-family:Consolas,monospace;font-size:10px;color:#c4b0ff">${esc(domain)||'<span style="color:rgba(255,255,255,.2)">DNS</span>'}</span>`;
        }

        // HTTP / WS — show "host : path"
        if (proto === 'http' || proto === 'ws') {
            let host = req.headers?.host || req.headers?.Host || '';
            let url  = req.url || req.requestURL || req.merca_uri || '';
            if (!url) url = req.headers?.referer || req.headers?.Referer || '';

            if (!host && url.startsWith('http')) {
                try { host = new URL(url).host; } catch(_) {}
            }

            let path = '/';
            try {
                const u = new URL(url.startsWith('http') ? url : 'http://x' + url);
                path = u.pathname + (u.search || '');
            } catch(_) {
                path = url.replace(/^https?:\/\/[^\/]+/, '') || url || '/';
            }

            const hostStr = host || '—';
            const pathStr = path.length > 55 ? path.slice(0, 55) + '…' : path;

            return `<span style="font-family:Consolas,monospace;font-size:10px;white-space:nowrap" title="${esc(url)}"><span style="color:#7eb8ff">${esc(hostStr)}</span><span style="color:rgba(255,255,255,.3);margin:0 4px">:</span><span style="color:rgba(255,255,255,.75)">${esc(pathStr)}</span></span>`;
        }

        // ICMP / fallback
        if (!ua || ua === 'N/A') return '<span style="color:rgba(255,255,255,.2);font-size:10px">—</span>';
        return `<span class="ua-val" title="${esc(ua)}">${esc(ua.length>maxLen?ua.slice(0,maxLen)+'…':ua)}</span>`;
    }

        fetch('/api/ips/lists')

    /* Compute threat level from IP trend */
    function threatBadge(ip) {
        if (!ip||!lastData.length) return '<span class="t-low">—</span>';
        const hits=lastData.filter(l=>l.Ip===ip);
        if (!hits.length) return '<span class="t-low">LOW</span>';
        const botHits=hits.filter(l=>{const r=parseReq(l.Er);return classifyBot(l,r)==='bot';}).length;
        const times=hits.map(l=>new Date(l.Ts)).filter(d=>!isNaN(d)).sort((a,b)=>a-b);
        const spanMs=times.length>1?times[times.length-1]-times[0]:0;
        const freq=hits.length/Math.max(spanMs/1000,1);
        if (botHits>hits.length*0.5&&hits.length>2) return '<span class="t-high">HIGH</span>';
        if (freq>2||hits.length>5) return '<span class="t-medium">MED</span>';
        return '<span class="t-low">LOW</span>';
    }

    /* ── IP Trend ── */
    function ipTrend(ip) {
        if (!ip||!lastData.length) return null;
        const hits=lastData.filter(l=>l.Ip===ip);
        if (!hits.length) return null;
        const botHits=hits.filter(l=>classifyBot(l,parseReq(l.Er))==='bot').length;
        const humanHits=hits.length-botHits;
        const protos={}, methods={};
        const times=hits.map(l=>new Date(l.Ts)).filter(d=>!isNaN(d)).sort((a,b)=>a-b);
        hits.forEach(l=>{ const r=parseReq(l.Er); const p=getProto(l,r); protos[p]=(protos[p]||0)+1; const m=r.method||'GET'; methods[m]=(methods[m]||0)+1; });
        const spanMs=times.length>1?times[times.length-1]-times[0]:0;
        const freq=hits.length/Math.max(spanMs/1000,1);
        let threat='low';
        if (botHits>humanHits&&hits.length>2) threat='high';
        else if (freq>2||hits.length>5) threat='medium';
        return {total:hits.length,botHits,humanHits,protos,methods,freq:freq.toFixed(2),spanMs,threat};
    }

    /* ── PHP-PROXY structured block (multi-CDN aware) ── */
    function buildPhpProxyBlock(req, log) {
        const h = req.headers || {};
        function gv(k) { const v = h[k]; return v !== undefined ? v : (h[k.toLowerCase()] !== undefined ? h[k.toLowerCase()] : ''); }
        function gvFirst(k) { return (gv(k) || '').trim().split(',')[0].trim(); }

        // ── CDN / proxy detection ──
        function detectCDN() {
            if (gv('HTTP_CF_RAY') || gv('HTTP_CF_CONNECTING_IP') || (gv('HTTP_CDN_LOOP') || '').toLowerCase().includes('cloudflare'))
                return { type:'cloudflare',   label:'Via Cloudflare',          color:'#fb923c', bg:'rgba(249,115,22,.07)',  border:'rgba(249,115,22,.22)' };
            if (gv('HTTP_X_AKAMAI_EDGESCAPE') || gv('HTTP_TRUE_CLIENT_IP') || gv('HTTP_AKAMAI_ORIGIN_HOP') || gv('HTTP_X_CHECK_CACHEABLE'))
                return { type:'akamai',        label:'Via Akamai',              color:'#009bde', bg:'rgba(0,155,222,.07)',   border:'rgba(0,155,222,.22)' };
            if (gv('HTTP_CLOUDFRONT_VIEWER_COUNTRY') || gv('HTTP_X_AMZ_CF_ID') || gv('HTTP_CLOUDFRONT_FORWARDED_PROTO') || (gv('HTTP_VIA') || '').toLowerCase().includes('cloudfront'))
                return { type:'cloudfront',    label:'Via CloudFront (AWS)',    color:'#ff9900', bg:'rgba(255,153,0,.07)',   border:'rgba(255,153,0,.22)' };
            if (gv('HTTP_X_CLOUD_TRACE_CONTEXT') || (gv('HTTP_VIA') || '').toLowerCase().includes('google') || gv('HTTP_X_GOOGLE_CACHE_CONTROL'))
                return { type:'google',        label:'Via Google Cloud CDN',    color:'#4285f4', bg:'rgba(66,133,244,.07)',  border:'rgba(66,133,244,.22)' };
            if (gv('HTTP_X_AZURE_CLIENTIP') || gv('HTTP_X_AZURE_FDID') || gv('HTTP_X_FD_HEALTHPROBE') || gv('HTTP_X_MS_USERAGENT'))
                return { type:'azure',         label:'Via Azure Front Door',    color:'#0078d4', bg:'rgba(0,120,212,.07)',   border:'rgba(0,120,212,.22)' };
            if (gv('HTTP_X_FORWARDED_FOR_IP') || gv('HTTP_VISITORIP') || gv('HTTP_INCAP_CLIENT_IP') || (gv('HTTP_VIA') || '').toLowerCase().includes('incapsula') || (gv('HTTP_USER_AGENT') || '').toLowerCase().includes('imperva'))
                return { type:'imperva',       label:'Via Imperva / Incapsula', color:'#e84040', bg:'rgba(232,64,64,.07)',   border:'rgba(232,64,64,.22)' };
            if (gv('HTTP_X_FORWARDED_FOR') || gv('HTTP_X_REAL_IP') || gv('HTTP_X_FORWARDED_PROTO') || gv('HTTP_VIA'))
                return { type:'proxy',         label:'Via Reverse Proxy / LB',  color:'#a78bfa', bg:'rgba(167,139,250,.07)', border:'rgba(167,139,250,.22)' };
            return   { type:'direct',          label:'Direct Connection',       color:'#5fffb0', bg:'rgba(95,255,176,.04)',  border:'rgba(95,255,176,.18)' };
        }
        const cdn = detectCDN();

        // ── Real IP extraction per CDN ──
        function getRealIp() {
            switch (cdn.type) {
                case 'cloudflare':  return { ip: gv('HTTP_CF_CONNECTING_IP') || gvFirst('HTTP_X_FORWARDED_FOR'),    src: gv('HTTP_CF_CONNECTING_IP') ? 'CF-Connecting-IP' : 'X-Forwarded-For' };
                case 'akamai':      return { ip: gv('HTTP_TRUE_CLIENT_IP')   || gvFirst('HTTP_X_FORWARDED_FOR'),    src: gv('HTTP_TRUE_CLIENT_IP') ? 'True-Client-IP' : 'X-Forwarded-For' };
                case 'cloudfront':  return { ip: gvFirst('HTTP_X_FORWARDED_FOR'),                                   src: 'X-Forwarded-For' };
                case 'google':      return { ip: gvFirst('HTTP_X_FORWARDED_FOR'),                                   src: 'X-Forwarded-For' };
                case 'azure':       return { ip: gv('HTTP_X_AZURE_CLIENTIP') || gvFirst('HTTP_X_FORWARDED_FOR'),    src: gv('HTTP_X_AZURE_CLIENTIP') ? 'X-Azure-ClientIP' : 'X-Forwarded-For' };
                case 'imperva':     return { ip: gv('HTTP_INCAP_CLIENT_IP') || gv('HTTP_VISITORIP') || gvFirst('HTTP_X_FORWARDED_FOR'), src: gv('HTTP_INCAP_CLIENT_IP') ? 'Incap-Client-IP' : gv('HTTP_VISITORIP') ? 'VisitorIP' : 'X-Forwarded-For' };
                case 'proxy':       return { ip: gvFirst('HTTP_X_FORWARDED_FOR') || gv('HTTP_X_REAL_IP'),           src: gv('HTTP_X_FORWARDED_FOR') ? 'X-Forwarded-For' : 'X-Real-IP' };
                default:            return { ip: gv('REMOTE_ADDR'),                                                  src: 'REMOTE_ADDR (direct)' };
            }
        }
        const realIpInfo = getRealIp();
        const remoteAddr = gv('REMOTE_ADDR');

        // ── CDN-specific metadata chips ──
        function getCdnMeta() {
            switch (cdn.type) {
                case 'cloudflare': {
                    let cfScheme = ''; try { cfScheme = JSON.parse(gv('HTTP_CF_VISITOR')).scheme || ''; } catch(_) {}
                    return [
                        gv('HTTP_CF_RAY')       && ['RAY',     gv('HTTP_CF_RAY')],
                        gv('HTTP_CF_IPCOUNTRY') && ['Country', gv('HTTP_CF_IPCOUNTRY')],
                        cfScheme                && ['Scheme',  cfScheme.toUpperCase()],
                        gv('HTTP_CDN_LOOP')     && ['Loop',    gv('HTTP_CDN_LOOP')],
                    ].filter(Boolean);
                }
                case 'akamai': {
                    const es = {}; (gv('HTTP_X_AKAMAI_EDGESCAPE') || '').split(',').forEach(function(p) { const kv = p.split('='); if (kv[0] && kv[1]) es[kv[0].trim().toLowerCase()] = kv[1].trim(); });
                    return [
                        es.country_code  && ['Country', es.country_code],
                        es.city          && ['City',    es.city.replace(/\+/g, ' ')],
                        es.region_code   && ['Region',  es.region_code],
                        es.network_type  && ['Network', es.network_type],
                        gv('HTTP_AKAMAI_ORIGIN_HOP') && ['Hop', gv('HTTP_AKAMAI_ORIGIN_HOP')],
                        gv('HTTP_X_AKAMAI_EDGESCAPE') && ['EdgeScape', gv('HTTP_X_AKAMAI_EDGESCAPE').slice(0, 55)],
                    ].filter(Boolean);
                }
                case 'cloudfront': {
                    const via = gv('HTTP_VIA') || '';
                    const pop = (via.match(/([A-Z]{3}\d+)/)||[])[1] || '';
                    const device = gv('HTTP_CLOUDFRONT_IS_DESKTOP_VIEWER')==='true' ? 'Desktop' : gv('HTTP_CLOUDFRONT_IS_MOBILE_VIEWER')==='true' ? 'Mobile' : gv('HTTP_CLOUDFRONT_IS_TABLET_VIEWER')==='true' ? 'Tablet' : '';
                    const cfId = gv('HTTP_X_AMZ_CF_ID');
                    return [
                        gv('HTTP_CLOUDFRONT_VIEWER_COUNTRY')   && ['Country', gv('HTTP_CLOUDFRONT_VIEWER_COUNTRY')],
                        device                                  && ['Device',  device],
                        gv('HTTP_CLOUDFRONT_FORWARDED_PROTO')  && ['Scheme',  gv('HTTP_CLOUDFRONT_FORWARDED_PROTO').toUpperCase()],
                        pop                                     && ['POP',     pop],
                        cfId                                    && ['CF-ID',   cfId.slice(0, 28) + '…'],
                    ].filter(Boolean);
                }
                case 'google': {
                    return [
                        gv('HTTP_X_CLOUD_TRACE_CONTEXT') && ['Trace', gv('HTTP_X_CLOUD_TRACE_CONTEXT').slice(0, 40)],
                        gv('HTTP_VIA')                   && ['Via',   gv('HTTP_VIA').slice(0, 55)],
                    ].filter(Boolean);
                }
                case 'azure': {
                    return [
                        gv('HTTP_X_AZURE_FDID')             && ['FD-ID',   gv('HTTP_X_AZURE_FDID').slice(0, 36)],
                        gv('HTTP_X_AZURE_REQUESTCHAINID')   && ['Chain',   gv('HTTP_X_AZURE_REQUESTCHAINID').slice(0, 36)],
                        gv('HTTP_X_AZURE_SOCKETIP')         && ['Sock-IP', gv('HTTP_X_AZURE_SOCKETIP')],
                        gv('HTTP_X_FORWARDED_PROTO')        && ['Scheme',  gv('HTTP_X_FORWARDED_PROTO').toUpperCase()],
                    ].filter(Boolean);
                }
                case 'imperva': {
                    return [
                        gv('HTTP_INCAP_CLIENT_IP')    && ['Client-IP',  gv('HTTP_INCAP_CLIENT_IP')],
                        gv('HTTP_VISITORIP')          && ['Visitor-IP', gv('HTTP_VISITORIP')],
                        gv('HTTP_X_FORWARDED_PROTO')  && ['Scheme',     gv('HTTP_X_FORWARDED_PROTO').toUpperCase()],
                        gv('HTTP_VIA')                && ['Via',        gv('HTTP_VIA').slice(0, 55)],
                    ].filter(Boolean);
                }
                case 'proxy': {
                    return [
                        gv('HTTP_VIA')               && ['Via',    gv('HTTP_VIA').slice(0, 55)],
                        gv('HTTP_X_FORWARDED_PROTO') && ['Scheme', gv('HTTP_X_FORWARDED_PROTO').toUpperCase()],
                        gv('HTTP_X_REAL_IP')         && ['X-Real-IP', gv('HTTP_X_REAL_IP')],
                    ].filter(Boolean);
                }
                default: return [];
            }
        }
        const cdnMeta = getCdnMeta();

        // ── HTTPS detection (multi-source) ──
        let httpsOn = gv('HTTPS') === 'on';
        if (!httpsOn) try { httpsOn = JSON.parse(gv('HTTP_CF_VISITOR')).scheme === 'https'; } catch(_) {}
        if (!httpsOn) httpsOn = gv('HTTP_CLOUDFRONT_FORWARDED_PROTO') === 'https' || gv('HTTP_X_FORWARDED_PROTO') === 'https';

        // Server
        const serverName = gv('SERVER_NAME');
        const serverAddr = gv('SERVER_ADDR');
        const serverPort = gv('SERVER_PORT');
        const serverSw   = (gv('SERVER_SOFTWARE') || gv('SERVER_SIGNATURE') || '').replace(/<[^>]+>/g, '').trim();
        const host       = gv('HTTP_HOST') || serverName;
        const sslSni     = gv('SSL_TLS_SNI');

        // Request
        const reqUri    = gv('REQUEST_URI') || req.url || '/';
        const reqMethod = gv('REQUEST_METHOD') || req.method || 'GET';
        const qString   = gv('QUERY_STRING');
        const ctType    = gv('CONTENT_TYPE');
        const ctLen     = gv('CONTENT_LENGTH');

        // Script / CGI
        const scriptFile = gv('SCRIPT_FILENAME');
        const docRoot    = gv('DOCUMENT_ROOT') || gv('CONTEXT_DOCUMENT_ROOT');
        const fcgiRole   = gv('FCGI_ROLE');
        const gwIface    = gv('GATEWAY_INTERFACE');

        // Split: HTTP headers vs CGI env
        const httpHdrs = {}, cgiEnv = {};
        Object.entries(h).forEach(function(entry) {
            const k = entry[0], v = entry[1];
            if (k.startsWith('HTTP_')) {
                const clean = k.slice(5).split('_').map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase(); }).join('-');
                httpHdrs[clean] = v;
            } else {
                cgiEnv[k] = v;
            }
        });

        // Per-CDN header prefixes to highlight
        const cdnHdrMap = {
            cloudflare:  ['Cf-', 'Cdn-Loop'],
            akamai:      ['X-Akamai', 'True-Client-Ip', 'X-Check-'],
            cloudfront:  ['Cloudfront-', 'X-Amz-Cf-'],
            google:      ['X-Cloud-', 'X-Google-', 'X-Goog-'],
            azure:       ['X-Azure-', 'X-Fd-', 'X-Ms-'],
            imperva:     ['X-Forwarded-For-Ip', 'Visitorip', 'Incap-', 'X-Iinfo'],
            proxy:       ['X-Forwarded-', 'X-Real-', 'Via'],
            direct:      [],
        };
        const cdnPfx = cdnHdrMap[cdn.type] || [];
        function isCdnHdr(k) { return cdnPfx.some(function(p) { return k.toLowerCase().startsWith(p.toLowerCase()); }); }

        let out = '';

        // ── CDN Banner ──
        out += '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;padding:5px 14px;background:' + cdn.bg + ';border-bottom:1px solid ' + cdn.border + '">'
            + '<span style="font-size:9px;font-weight:700;color:' + cdn.color + ';letter-spacing:.1em;text-transform:uppercase">◈ ' + cdn.label + '</span>';
        cdnMeta.forEach(function(m) {
            out += '<span style="display:inline-flex;align-items:center;gap:4px">'
                + '<span style="font-size:8px;color:' + cdn.color + ';opacity:.55;text-transform:uppercase;letter-spacing:.07em">' + esc(m[0]) + '</span>'
                + '<span style="font-family:Consolas,monospace;font-size:9px;color:rgba(255,255,255,.65)">' + esc(String(m[1])) + '</span>'
                + '</span>';
        });
        out += '</div>';

        // ── IP grid: Real IP | CDN Edge | Origin Server ──
        const isDirect = cdn.type === 'direct';
        const realCol  = isDirect ? '#5fffb0' : cdn.color;
        const edgeLabel = isDirect ? 'Client IP' : cdn.type === 'proxy' ? 'Proxy IP' : 'CDN Edge Node';
        const edgeNote  = isDirect ? 'Direct (no CDN/proxy)' : cdn.label + ' network';
        const edgeColor = isDirect ? 'rgba(95,255,176,.35)' : 'rgba(255,208,112,.35)';

        out += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid rgba(255,255,255,.05)">'
            + '<div style="padding:7px 14px;border-right:1px solid rgba(255,255,255,.04)">'
            + '<div style="font-size:8px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px">Real Client IP</div>'
            + '<div style="font-family:Consolas,monospace;font-size:13px;font-weight:700;color:' + realCol + '">' + esc(realIpInfo.ip || '—') + '</div>'
            + '<div style="font-size:8px;color:rgba(255,255,255,.28);margin-top:2px">via ' + esc(realIpInfo.src) + '</div>'
            + '</div>'
            + '<div style="padding:7px 14px;border-right:1px solid rgba(255,255,255,.04)">'
            + '<div style="font-size:8px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px">' + edgeLabel + '</div>'
            + '<div style="font-family:Consolas,monospace;font-size:13px;font-weight:700;color:' + (isDirect ? '#5fffb0' : 'rgba(255,208,112,.85)') + '">' + esc(remoteAddr || '—') + '</div>'
            + '<div style="font-size:8px;color:' + edgeColor + ';margin-top:2px">' + edgeNote + '</div>'
            + '</div>'
            + '<div style="padding:7px 14px">'
            + '<div style="font-size:8px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px">Origin Server</div>'
            + '<div style="font-family:Consolas,monospace;font-size:13px;font-weight:700;color:rgba(196,176,255,.85)">' + esc(serverAddr || serverName || '—') + '</div>'
            + '<div style="font-size:8px;color:rgba(196,176,255,.35);margin-top:2px">' + [serverPort ? ':' + serverPort : '', httpsOn ? 'SSL/TLS' : '', sslSni ? 'SNI: ' + sslSni : ''].filter(Boolean).join(' · ') + '</div>'
            + '</div>'
            + '</div>';

        // ── Request line ──
        out += '<div style="padding:6px 14px;background:rgba(0,0,0,.22);border-bottom:1px solid rgba(255,255,255,.04);font-family:Consolas,monospace;font-size:11px;display:flex;align-items:center;flex-wrap:wrap;gap:8px">'
            + '<span style="color:#5fffb0;font-weight:700">' + esc(reqMethod) + '</span>'
            + '<span style="color:#fff">' + esc(reqUri) + '</span>'
            + '<span style="color:rgba(255,255,255,.2)">HTTP/1.1</span>'
            + (host ? '<span style="color:rgba(255,255,255,.2)">·</span><span style="color:rgba(126,184,255,.7)">' + esc(host) + '</span>' : '')
            + (httpsOn ? '<span style="padding:0 5px;border-radius:2px;font-size:9px;font-weight:700;background:rgba(95,255,176,.1);color:#5fffb0">HTTPS</span>' : '')
            + (qString ? '<span style="color:rgba(255,208,112,.55);font-size:9px">?' + esc(qString) + '</span>' : '')
            + '</div>';

        // ── Info chips ──
        const chips = [
            serverSw   && ['Software',     serverSw.slice(0, 60)],
            scriptFile && ['Script',       scriptFile],
            docRoot    && ['DocRoot',      docRoot],
            ctType     && ['Content-Type', ctType],
            ctLen      && ['Size',         ctLen + ' B'],
            gwIface    && ['Gateway',      gwIface],
            fcgiRole   && ['FCGI',         fcgiRole],
        ].filter(Boolean);
        if (chips.length) {
            out += '<div style="display:flex;flex-wrap:wrap;gap:4px;padding:5px 14px;background:rgba(255,255,255,.01);border-bottom:1px solid rgba(255,255,255,.04)">';
            chips.forEach(function(chip) {
                out += '<span style="display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border:1px solid rgba(255,255,255,.06);border-radius:2px">'
                    + '<span style="font-size:8px;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:.07em">' + esc(chip[0]) + '</span>'
                    + '<span style="font-family:Consolas,monospace;font-size:9px;color:rgba(255,255,255,.55)">' + esc(String(chip[1])) + '</span>'
                    + '</span>';
            });
            out += '</div>';
        }

        // ── Two-col: raw HTTP headers | CGI Env (no scroll, all data shown) ──
        const cdnKeys  = Object.keys(httpHdrs).filter(isCdnHdr);
        const restKeys = Object.keys(httpHdrs).filter(function(k) { return !isCdnHdr(k); }).sort();

        out += '<div style="display:grid;grid-template-columns:1fr 1fr">';

        // Left: raw HTTP headers
        out += '<div style="padding:8px 14px;border-right:1px solid rgba(255,255,255,.04)">'
            + '<div style="font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:6px">HTTP Headers <span style="font-weight:400;color:rgba(255,255,255,.15)">' + (cdnKeys.length + restKeys.length) + '</span></div>'
            + '<div style="font-family:Consolas,monospace;font-size:9.5px;line-height:1.8">';
        cdnKeys.concat(restKeys).forEach(function(k) {
            out += '<div style="word-break:break-all">'
                + '<span style="color:' + (isCdnHdr(k) ? cdn.color : '#7eb8ff') + '">' + esc(k) + '</span>'
                + '<span style="color:rgba(255,255,255,.2)">: </span>'
                + '<span style="color:rgba(255,255,255,.65)">' + esc(String(httpHdrs[k] || '')) + '</span>'
                + '</div>';
        });
        out += '</div></div>';

        // Right: CGI env (all rows, no scroll)
        const cgiPriority = ['REMOTE_ADDR','SERVER_ADDR','SERVER_NAME','REQUEST_URI','REQUEST_METHOD','SCRIPT_FILENAME'];
        const sortedCgi = cgiPriority.filter(function(k) { return cgiEnv[k] !== undefined; }).concat(
            Object.keys(cgiEnv).filter(function(k) { return cgiPriority.indexOf(k) === -1; }).sort()
        );
        out += '<div style="padding:8px 14px">'
            + '<div style="font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:5px">CGI / Server Env <span style="font-weight:400;color:rgba(255,255,255,.15)">' + sortedCgi.length + '</span></div>'
            + '<div>';
        sortedCgi.forEach(function(k) {
            const isImp = cgiPriority.indexOf(k) !== -1;
            out += '<div style="display:flex;gap:8px;padding:1px 0;border-bottom:1px solid rgba(255,255,255,.025)">'
                + '<span style="flex-shrink:0;width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:9px;font-weight:600;letter-spacing:.04em;color:' + (isImp ? '#ffd070' : 'rgba(255,255,255,.32)') + ';text-transform:uppercase">' + esc(k) + '</span>'
                + '<span style="flex:1;min-width:0;color:rgba(255,255,255,.55);word-break:break-all;font-family:Consolas,monospace;font-size:9px;line-height:1.5">' + esc(String(cgiEnv[k] || '')) + '</span>'
                + '</div>';
        });
        out += '</div></div>';
        out += '</div>'; // two-col
        return out;
    }

    /* ── Detail panel ── */
    function buildDetail(log, req, proto, botLevel) {
        function kv(label,val,cls){ if(!val||val==='—')return ''; return `<div class="det-kv"><span class="det-kv-label">${label}</span><span class="det-kv-val${cls?' '+cls:''}">${val}</span></div>`; }
        function sectionBar(color,title){ return `<div class="det-section-bar"><span class="dsb-dot" style="background:${color}"></span>${title}</div>`; }

        const ipVal   = esc(req.detected_ip||log.Ip||'—');
        const method  = esc(req.method||(proto==='dns'?'DNS':proto==='icmp'?'ICMP':'—'));
        const urlVal  = esc(req.url||req.requestURL||req.merca_uri||'—');
        const ref     = esc(req.referer||req.referrer||(req.headers&&(req.headers['referer']||req.headers['Referer']))||'—');
        const ua      = esc(log.Ua||'—');
        const ts      = esc(log.Ts||'—');
        const rawSize = (()=>{ try{ const r=atob(log.Er||''); return r.length>1024?(r.length/1024).toFixed(1)+' KB':r.length+' B'; }catch(_){return '—';} })();
        const lang    = detectLang(log, req);

        const clsColor = botLevel==='bot'?'#ff8080':botLevel==='likely'?'#ffd070':'#5fffb0';
        const clsLabel = botLevel==='bot'?'🤖 Confirmed Bot':botLevel==='likely'?'⚠ Likely Bot':'👤 Human';

        const bodyData   = req.body||req.postData||req.data||null;
        const hasBody    = bodyData && typeof bodyData==='object' && Object.keys(bodyData).length>0;
        const hasBodyStr = bodyData && typeof bodyData==='string' && bodyData.trim().length>0;

        const queryParams = (()=>{
            try{ const u=req.url||''; const q=new URL(u,'http://x').searchParams; const o={}; q.forEach((v,k)=>o[k]=v); return Object.keys(o).length?o:null; }
            catch(_){return null;}
        })();

        const hasFP   = !!(log.Fu && log.Fu!=='' && log.Fu!=='N/B');
        const trend   = ipTrend(log.Ip);
        const tCol    = !trend?'#555':trend.threat==='high'?'#ff8080':trend.threat==='medium'?'#ffd070':'#5fffb0';
        const ipc     = _ipCache[log.Ip];

        // ── traffic stats ──
        const stIpLogs = lastData.filter(l=>l.Ip===log.Ip);
        const stIpTotal = stIpLogs.length;
        const stIpPct = lastData.length?((stIpTotal/lastData.length)*100).toFixed(1):'0';
        let stIpH=0,stIpL=0,stIpB=0;
        const stIpProtos={},stIpUAs={};
        stIpLogs.forEach(l=>{
            const r=parseReq(l.Er);
            const bl=classifyBot(l,r);if(bl==='human')stIpH++;else if(bl==='likely')stIpL++;else stIpB++;
            const p=getProto(l,r);stIpProtos[p]=(stIpProtos[p]||0)+1;
            if(l.Ua&&l.Ua!=='N/A')stIpUAs[l.Ua]=(stIpUAs[l.Ua]||0)+1;
        });
        const stTopUAs = Object.entries(stIpUAs).sort((a,b)=>b[1]-a[1]).slice(0,4);
        const stIpTimes = stIpLogs.map(l=>new Date(l.Ts)).filter(d=>!isNaN(d)).sort((a,b)=>a-b);
        const stFuLogs = hasFP?lastData.filter(l=>l.Fu===log.Fu):[];
        const stFuTotal = stFuLogs.length;
        const stFuPct = hasFP&&lastData.length?((stFuTotal/lastData.length)*100).toFixed(1):'0';
        const stFuIPs = hasFP?[...new Set(stFuLogs.map(l=>l.Ip).filter(Boolean))].slice(0,6):[];

        let html = '<div class="det-flat">';

        // ── ACTION BAR ──
        const _abtn=(col,fn,lbl)=>`<button onclick="${fn}" style="pointer-events:all;padding:2px 9px;border:1px solid ${col}44;border-radius:3px;color:${col};background:transparent;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.04em">${lbl}</button>`;
        html += `<div class="det-actions-row">
            <span style="font-size:10px;color:${clsColor};font-weight:700;margin-right:8px">${clsLabel}</span>
            ${log.Dl?_abtn('#c4b0ff',`cbFilterBy('${esc(log.Dl||'')}')`,  'FILTER DEALER'):''}
            ${log.Ip?_abtn('#7eb8ff',`cbFilterBy('${esc(log.Ip||'')}')`,  'FILTER IP'):''}
            ${log.Fu?_abtn('#5fffb0',`cbFilterBy('${esc(log.Fu||'')}')`,  'FILTER FU'):''}
            ${_abtn('#ff8080',`banIp('${esc(log.Ip||'')}',this)`,   'BAN IP')}
            ${_abtn('#5fffb0',`unbanIp('${esc(log.Ip||'')}',this)`, 'UNBAN IP')}
            ${log.Fr?`<a href="/web/info?id=${esc(log.Fr)}" target="_blank" onclick="event.stopPropagation()" style="pointer-events:all;padding:2px 9px;border:1px solid rgba(126,184,255,.35);border-radius:3px;color:#7eb8ff;background:transparent;font-size:10px;font-weight:700;cursor:pointer;text-decoration:none;letter-spacing:.04em">REQUEST DATA →</a>`:''}
        </div>`;

        // ── FULL-WIDTH RAW REQUEST BLOCK ──
        {
            const rawLines = [];
            const isPhpProxyReq = !!(log.Dl || '').toUpperCase().match(/PHP[.\-_]?PROXY/);
            if(proto==='dns'){
                const dType=req.type||req.qtype||'QUERY';
                rawLines.push(`<span style="color:#ff8080;font-weight:700">DNS</span> <span style="color:#ffcc66">${esc(String(dType))}</span> <span style="color:#fff">${esc(String(req.name||req.query||urlVal))}</span>`);
                const skip=new Set(['detected_ip','dealer_uri','merca_uri','requestURL','method','url','headers','name','query','type','qtype']);
                Object.entries(req).filter(([k])=>!skip.has(k)).forEach(([k,v])=>{
                    const val=typeof v==='object'?JSON.stringify(v):String(v||'');
                    if(val) rawLines.push(`<span style="color:#7eb8ff">${esc(k)}</span><span style="color:rgba(255,255,255,.2)">: </span><span style="color:rgba(255,255,255,.65)">${esc(val.slice(0,200))}</span>`);
                });
            } else if(proto==='icmp'){
                rawLines.push(`<span style="color:#ff8080;font-weight:700">ICMP</span> <span style="color:#ffcc66">type=${esc(String(req.type||'?'))}</span>${req.code!==undefined?` <span style="color:rgba(255,255,255,.5)">code=${esc(String(req.code))}</span>`:''}`);
                const skip=new Set(['detected_ip','dealer_uri','merca_uri','requestURL','method','url','headers','type','code']);
                Object.entries(req).filter(([k])=>!skip.has(k)).forEach(([k,v])=>{
                    const val=typeof v==='object'?JSON.stringify(v):String(v||'');
                    if(val) rawLines.push(`<span style="color:#7eb8ff">${esc(k)}</span><span style="color:rgba(255,255,255,.2)">: </span><span style="color:rgba(255,255,255,.65)">${esc(val.slice(0,200))}</span>`);
                });
            } else if (!isPhpProxyReq) {
                rawLines.push(...renderRequestDetails(req));
            }
            const _rawBody = isPhpProxyReq
                ? buildPhpProxyBlock(req, log)
                : '<pre style="margin:0;padding:10px 14px;font-family:Consolas,monospace;font-size:10px;line-height:1.7;overflow:visible;background:rgba(0,0,0,.15);white-space:pre-wrap;word-break:break-all">' + rawLines.join('\n') + '</pre>';
            html += `<div style="border-bottom:1px solid rgba(255,255,255,.05)">
                <div style="display:flex;align-items:center;gap:6px;padding:5px 14px;border-bottom:1px solid rgba(255,255,255,.04);flex-wrap:wrap;background:rgba(255,255,255,.015)">
                    <span style="font-family:Consolas,monospace;font-size:11px;color:#fff;font-weight:700">${ipVal}</span>
                    <span style="color:rgba(255,255,255,.2)">·</span>
                    ${protoBadge(proto)} ${methodBadge(proto,method)}
                    <span style="color:rgba(255,255,255,.2)">·</span>
                    <span style="font-size:9px;color:rgba(255,255,255,.35);font-family:Consolas,monospace">${ts}</span>
                    ${lang?`<span style="color:rgba(255,255,255,.2)">·</span><span style="font-size:9px;color:rgba(255,255,255,.35);font-family:Consolas,monospace">${esc(lang)}</span>`:''}
                    <span style="color:rgba(255,255,255,.2)">·</span>
                    <span style="font-size:9px;color:rgba(255,255,255,.35);font-family:Consolas,monospace">${rawSize}</span>
                    <span style="margin-left:auto;display:flex;gap:5px;align-items:center">
                        <span style="display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border:1px solid rgba(126,184,255,.2);border-radius:3px;font-size:9px;font-family:Consolas,monospace;background:rgba(126,184,255,.04)"><span style="color:rgba(255,255,255,.3)">IP</span><span style="color:#7eb8ff;font-weight:700">&nbsp;${stIpPct}%</span><span style="color:rgba(255,255,255,.25)">&nbsp;· ${stIpTotal} req</span></span>
                        ${hasFP?`<span style="display:inline-flex;align-items:center;gap:3px;padding:1px 7px;border:1px solid rgba(95,255,176,.2);border-radius:3px;font-size:9px;font-family:Consolas,monospace;background:rgba(95,255,176,.04)"><span style="color:rgba(255,255,255,.3)">FU</span><span style="color:#5fffb0;font-weight:700">&nbsp;${stFuPct}%</span><span style="color:rgba(255,255,255,.25)">&nbsp;· ${stFuTotal} seen</span></span>`:''}
                    </span>
                </div>
                ${_rawBody}
            </div>`;
        }

        // ── TWO COL: fingerprints+intel | device ──
        const hasDevice = !!(log.Jd && log.Jd!=='W29iamVjdCBPYmplY3Rd');
        html += `<div style="display:grid;grid-template-columns:${hasDevice?'1fr 1fr':'1fr'};gap:0;border-bottom:1px solid rgba(255,255,255,.05);min-width:0;overflow:hidden">`;

        // Identity & Intel
        html += '<div class="det-col" style="padding:10px 14px">';
        html += `<div class="det-col-head"><span class="dch-dot" style="background:#5fffb0"></span>Identity & Intel</div>`;

        // Fu
        if(hasFP){
            html += `<div style="margin-bottom:6px">
                <div class="det-kv-label" style="margin-bottom:2px">Fu — Browser Hash</div>
                <a href="/web/statics?finger=${esc(log.Fu)}" target="_blank" onclick="event.stopPropagation()" style="font-family:Consolas,monospace;font-size:9px;color:#7eb8ff;text-decoration:underline dotted rgba(126,184,255,.4);word-break:break-all;line-height:1.6">${esc(log.Fu)}</a>
            </div>`;
        } else {
            html += `<div style="margin-bottom:6px;font-size:10px;color:#ff8080;font-weight:700">✗ No Fingerprint</div>`;
        }

        // Fb
        if(log.Fb) html += `<div style="margin-bottom:6px"><div class="det-kv-label" style="margin-bottom:2px">Fb — Canvas Hash</div><div style="font-family:Consolas,monospace;font-size:9px;color:rgba(126,184,255,.7);word-break:break-all">${esc(log.Fb)}</div></div>`;

        // Fr — link to /web/info
        if(log.Fr) html += `<div style="margin-bottom:6px"><div class="det-kv-label" style="margin-bottom:2px">Fr — Request Hash</div><a href="/web/info?id=${esc(log.Fr)}" target="_blank" onclick="event.stopPropagation()" style="font-family:Consolas,monospace;font-size:9px;color:rgba(255,255,255,.45);text-decoration:underline dotted rgba(255,255,255,.25);word-break:break-all">${esc(log.Fr)}</a></div>`;

        // Bot card compact
        const bcCls  = botLevel==='bot'?'bc-bot':botLevel==='likely'?'bc-likely':'bc-human';
        const bcIcon = botLevel==='bot'?'🤖':botLevel==='likely'?'⚠':'👤';
        html += `<div class="bot-card ${bcCls}" style="margin-bottom:6px">
            <div class="bot-card-title" style="margin-bottom:2px">${bcIcon} ${clsLabel}</div>
            <div style="font-size:9px;color:rgba(255,255,255,.4)">${botLevel==='bot'?'Known bot/scanner UA or no UA.':botLevel==='likely'?'UA present but no fingerprint.':'Valid fingerprint + real browser UA.'}</div>
        </div>`;

        // IP intel card compact
        if(ipc?.status==='known'){
            html += `<div class="ip-card ip-in-db" style="margin-bottom:6px">
                <div class="ip-card-title" style="margin-bottom:2px">✓ IP in Intel DB</div>
                <a href="/web/ipdata?id=${ipc.id}" target="_blank" style="font-family:Consolas,monospace;font-size:10px;color:#5fffb0;text-decoration:none;pointer-events:all">${ipVal} → View Intel #${ipc.id}</a>
            </div>`;
        } else {
            html += `<div class="ip-card ip-not-db" style="margin-bottom:6px">
                <div class="ip-card-title" style="margin-bottom:2px">IP not in Intel DB</div>
                <button onclick="addIPtoOsint('${esc(log.Ip||'')}')" style="font-size:9px;padding:1px 7px;border:1px solid rgba(255,208,112,.3);border-radius:3px;color:#ffd070;background:transparent;cursor:pointer;pointer-events:all">+ Add to OSINT</button>
            </div>`;
        }

        // IP trend bar
        if(trend){
            const tBarW = Math.min(100,Math.round(trend.total/Math.max(lastData.length,1)*100*5));
            html += `<div style="font-size:9px;color:${tCol};margin-bottom:3px">${trend.total} hits · ${trend.humanHits} human · ${trend.botHits} bot · ${trend.freq}/s</div>`;
            html += `<div class="threat-bar"><div class="threat-fill" style="width:${tBarW}%;background:${tCol}"></div></div>`;
        }

        html += '</div>'; // right col

        // ── THIRD COL: Device or Domain ──
        if(hasDevice){
            html += '<div class="det-col" style="padding:6px 10px;border-left:1px solid rgba(255,255,255,.06)">';
            html += `<div class="det-col-head" style="margin-bottom:4px"><span class="dch-dot" style="background:#c4b0ff"></span>Device</div>`;
            try{
                const jd3=JSON.parse(atob(log.Jd));
                const bd3=jd3.browserData||{},dev3=jd3.deviceData||{},gpu3=jd3.gpuData||{};
                const bat3=bd3.batteryData||{},net3=bd3.networkInfo||{};
                [
                    ['Platform',dev3.platform],['CPU',dev3.hardwareConcurrency?dev3.hardwareConcurrency+' cores':null],
                    ['RAM',dev3.deviceMemory?dev3.deviceMemory+' GB':null],
                    ['GPU',gpu3.renderer?gpu3.renderer.slice(0,40):null],
                    ['Touch',dev3.maxTouchPoints!=null?String(dev3.maxTouchPoints)+' pts':null],
                    ['Battery',bat3.level!=null?Math.round(bat3.level*100)+'% '+(bat3.charging?'⚡':'🔋'):null],
                    ['Network',net3.effectiveType?net3.effectiveType+(net3.downlink?' · '+net3.downlink+' Mbps':''):null],
                    ['Languages',(dev3.languages||[]).slice(0,3).join(', ')||null],
                    ['RTC IP',bd3.rtcdata?bd3.rtcdata.slice(0,45):null],
                    ['JS Heap',bd3.memoryInfo?.usedJSHeapSize?Math.round(bd3.memoryInfo.usedJSHeapSize/1048576)+' MB':null],
                    ['Color',gpu3.colorDepth?gpu3.colorDepth+' bit':null],
                    ['Vendor',dev3.vendor||null],
                ].filter(([,v])=>v).forEach(([l,v])=>{
                    html += `<div style="display:flex;justify-content:space-between;align-items:baseline;padding:1px 0;border-bottom:1px solid rgba(255,255,255,.03);gap:6px"><span style="font-size:8px;color:rgba(255,255,255,.28);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;flex-shrink:0">${l}</span><span style="font-size:9px;color:rgba(255,255,255,.7);font-family:Consolas,monospace;word-break:break-all;text-align:right">${esc(String(v))}</span></div>`;
                });
            }catch(_){
                html += '<div style="font-size:9px;color:rgba(255,255,255,.2)">No device data</div>';
            }
            html += '</div>';
        } else if(proto==='dns'){
            // DNS: show WHOIS domain info via public API
            const dnsName = (()=>{ try{ const r=parseReq(log.Er); return r.questions?.[0]?.name||r.merca_uri||log.Fu||''; }catch(_){return log.Fu||'';} })();
            html += '<div class="det-col" style="padding:10px 14px;border-left:1px solid rgba(255,255,255,.06)">';
            html += `<div class="det-col-head"><span class="dch-dot" style="background:#c4b0ff"></span>Domain Intel</div>`;
            if(dnsName){
                const domainRoot = dnsName.split('.').slice(-2).join('.');
                html += `<div id="whois-${esc(log.Fr)}" style="font-size:10px;color:rgba(255,255,255,.3)">Loading WHOIS…</div>`;
                // Fetch WHOIS via public API (rdap.org)
                fetch('https://rdap.org/domain/'+encodeURIComponent(domainRoot))
                    .then(r=>r.ok?r.json():null)
                    .then(d=>{
                        const el = document.getElementById('whois-'+log.Fr);
                        if(!el||!d) return;
                        const rows = [
                            ['Domain',   d.ldhName||domainRoot],
                            ['Status',   (d.status||[]).slice(0,2).join(', ')||'—'],
                            ['Registrar',(d.entities||[]).find(e=>(e.roles||[]).includes('registrar'))?.vcardArray?.[1]?.find(v=>v[0]==='fn')?.[3]||'—'],
                            ['Created',  d.events?.find(e=>e.eventAction==='registration')?.eventDate?.slice(0,10)||'—'],
                            ['Expires',  d.events?.find(e=>e.eventAction==='expiration')?.eventDate?.slice(0,10)||'—'],
                            ['NS',       (d.nameservers||[]).slice(0,2).map(n=>n.ldhName).join(', ')||'—'],
                        ].filter(([,v])=>v&&v!=='—');
                        el.innerHTML = rows.map(([l,v])=>
                            `<div class="det-kv" style="margin-bottom:5px"><span class="det-kv-label">${l}</span><span style="font-size:10px;color:rgba(255,255,255,.72);font-family:Consolas,monospace;word-break:break-all">${v}</span></div>`
                        ).join('') || '<div style="color:rgba(255,255,255,.2)">No WHOIS data</div>';
                    })
                    .catch(()=>{
                        const el=document.getElementById('whois-'+log.Fr);
                        if(el) el.innerHTML='<span style="color:rgba(255,255,255,.2)">WHOIS unavailable</span>';
                    });
            } else {
                html += '<div style="font-size:10px;color:rgba(255,255,255,.2)">No domain</div>';
            }
            html += '</div>';
        }
        html += '</div>'; // three/two-col

        // ── STATS PANEL ──
        const hasParams = (queryParams && Object.keys(queryParams).length) || hasBody || hasBodyStr;
        const hasScreen = log.screen !== undefined;
        const screenOk  = log.screen && log.screen !== null && log.screen !== '';

        function sRow(lbl,val,col){ return `<div style="display:flex;justify-content:space-between;align-items:baseline;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04);min-width:0"><span style="font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;flex-shrink:0">${lbl}</span><span style="font-size:10px;font-family:Consolas,monospace;color:${col||'rgba(255,255,255,.7)'};font-weight:700;margin-left:8px;text-align:right">${val}</span></div>`; }
        function sHead(lbl,col){ return `<div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:7px;display:flex;align-items:center;gap:5px"><span style="width:4px;height:4px;border-radius:50%;background:${col};flex-shrink:0;display:inline-block"></span>${lbl}</div>`; }
        function pBar(pct,col){ const w=Math.min(100,parseFloat(pct)||0); return `<div style="height:2px;background:rgba(255,255,255,.07);border-radius:1px;margin:1px 0 5px;overflow:hidden"><div style="width:${w}%;height:100%;background:${col};border-radius:1px"></div></div>`; }

        const statCols = hasFP ? '1fr 1fr 1fr' : '1fr 1fr';
        html += `<div style="border-top:1px solid rgba(255,255,255,.05);display:grid;grid-template-columns:${statCols};gap:0">`;

        // COL 1 — IP Analytics
        html += `<div style="padding:8px 14px;border-right:1px solid rgba(255,255,255,.04)">`;
        html += sHead('IP Analytics','#7eb8ff');
        html += sRow('Total hits', stIpTotal, '#7eb8ff');
        html += sRow('% of traffic', stIpPct+'%', '#7eb8ff');
        html += pBar(stIpPct,'#7eb8ff');
        if(stIpH+stIpL+stIpB){
            html += `<div style="display:flex;height:4px;border-radius:2px;overflow:hidden;margin-bottom:3px">`;
            if(stIpH) html += `<div style="flex:${stIpH};background:rgba(95,255,176,.7)" title="${stIpH} human"></div>`;
            if(stIpL) html += `<div style="flex:${stIpL};background:rgba(255,208,112,.7)" title="${stIpL} likely"></div>`;
            if(stIpB) html += `<div style="flex:${stIpB};background:rgba(255,128,128,.7)" title="${stIpB} bot"></div>`;
            html += `</div><div style="display:flex;gap:8px;font-size:9px;margin-bottom:5px">`;
            if(stIpH) html += `<span style="color:#5fffb0">👤 ${stIpH}</span>`;
            if(stIpL) html += `<span style="color:#ffd070">⚠ ${stIpL}</span>`;
            if(stIpB) html += `<span style="color:#ff8080">🤖 ${stIpB}</span>`;
            html += `</div>`;
        }
        const _pC={http:'#3ecf8e',ws:'#a78bfa',dns:'#4f8ef7',icmp:'#f0a429'};
        Object.entries(stIpProtos).sort((a,b)=>b[1]-a[1]).forEach(([p,n])=>{ html+=sRow(p.toUpperCase(),n,_pC[p]||'rgba(255,255,255,.6)'); });
        if(stIpTimes.length){
            const fmtTs=d=>[String(d.getDate()).padStart(2,'0'),d.toLocaleDateString('en',{month:'short'})].join(' ')+' '+[d.getHours(),d.getMinutes(),d.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
            html += `<div style="margin-top:4px">`;
            html += sRow('First seen', fmtTs(stIpTimes[0]), 'rgba(255,255,255,.4)');
            if(stIpTimes.length>1) html += sRow('Last seen', fmtTs(stIpTimes[stIpTimes.length-1]), 'rgba(255,255,255,.4)');
            html += `</div>`;
        }
        html += `</div>`;

        // COL 2 — UA Breakdown
        html += `<div style="padding:8px 14px${hasFP?';border-right:1px solid rgba(255,255,255,.04)':''}">`;
        html += sHead('UA Breakdown','#c4b0ff');
        if(stTopUAs.length){
            stTopUAs.forEach(([uaStr,cnt])=>{
                const bl=classifyBot({Ua:uaStr},{});
                const blCol=bl==='bot'?'#ff8080':bl==='likely'?'#ffd070':'#5fffb0';
                const blIcon=bl==='bot'?'🤖':bl==='likely'?'⚠':'👤';
                const p=stIpTotal?((cnt/stIpTotal)*100).toFixed(0):0;
                html += `<div style="margin-bottom:6px"><div style="display:flex;align-items:center;gap:4px;margin-bottom:2px"><span>${blIcon}</span><span style="font-size:10px;font-weight:700;color:${blCol}">${cnt}</span><span style="font-size:9px;color:rgba(255,255,255,.3)">${p}%</span></div><div style="font-size:9px;font-family:Consolas,monospace;color:rgba(255,255,255,.45);word-break:break-all;line-height:1.4;background:rgba(255,255,255,.02);padding:3px 6px;border-radius:2px;border:1px solid rgba(255,255,255,.05)">${esc(uaStr.length>75?uaStr.slice(0,75)+'…':uaStr)}</div></div>`;
            });
            const extra=Object.keys(stIpUAs).length-stTopUAs.length;
            if(extra>0) html+=`<div style="font-size:9px;color:rgba(255,255,255,.22)">+ ${extra} more UAs</div>`;
        } else {
            html+=`<div style="font-size:10px;color:rgba(255,255,255,.2)">No UA data</div>`;
        }
        if(hasScreen) html+=`<div style="margin-top:8px;font-size:9px;font-weight:700;color:${screenOk?'#5fffb0':'rgba(255,255,255,.25)'}">${screenOk?'● Screenshot captured':'○ No screenshot'}</div>`;
        html += `</div>`;

        // COL 3 — FU Tracking (only if hasFP)
        if(hasFP){
            const allFuIPs=[...new Set(stFuLogs.map(l=>l.Ip).filter(Boolean))];
            html += `<div style="padding:8px 14px">`;
            html += sHead('Fu Tracking','#5fffb0');
            html += sRow('Appearances', stFuTotal, '#5fffb0');
            html += sRow('% of traffic', stFuPct+'%', '#5fffb0');
            html += pBar(stFuPct,'#5fffb0');
            html += sRow('Unique IPs', allFuIPs.length, 'rgba(255,255,255,.6)');
            if(stFuIPs.length){
                html+=`<div style="margin-top:5px">`;
                stFuIPs.forEach(ip=>{
                    const geo=_geoCache[ip];
                    const cur=ip===log.Ip;
                    html+=`<div style="font-size:9px;font-family:Consolas,monospace;padding:2px 0;color:${cur?'#7eb8ff':'rgba(255,255,255,.4)'}">${geo?.flag||''}${esc(ip)}${cur?' ←':''}</div>`;
                });
                if(allFuIPs.length>6) html+=`<div style="font-size:8px;color:rgba(255,255,255,.2);margin-top:2px">+ ${allFuIPs.length-6} more IPs</div>`;
                html+=`</div>`;
            }
            html += `</div>`;
        }
        html += `</div>`; // stats grid

        // ── PARAMS (if present) ──
        if(hasParams){
            const paramCount=(queryParams?Object.keys(queryParams).length:0)+(hasBody?Object.keys(bodyData).length:0);
            html+=`<div style="border-top:1px solid rgba(255,255,255,.05);padding:8px 14px">`;
            html+=`<div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:6px;display:flex;align-items:center;gap:6px"><span style="width:4px;height:4px;border-radius:50%;background:#ffd070;display:inline-block"></span>Parameters<span style="font-weight:400;color:rgba(255,255,255,.2)">${paramCount}</span></div>`;
            html+=`<div style="background:#010407;border:1px solid rgba(255,255,255,.07);border-radius:3px;padding:8px 10px;max-height:160px;overflow-y:auto"><div style="font-family:Consolas,monospace;font-size:9.5px;line-height:1.9;word-break:break-all">`;
            if(queryParams&&Object.keys(queryParams).length){
                html+=`<div style="color:rgba(255,255,255,.2);font-size:8px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">Query</div>`;
                html+=Object.entries(queryParams).map(([k,v])=>`<div><span style="color:#7eb8ff;font-weight:600">${esc(k)}</span><span style="color:rgba(255,255,255,.22)">: </span><span style="color:rgba(255,255,255,.7)">${esc(String(v))}</span></div>`).join('');
            }
            if(hasBody){
                if(queryParams&&Object.keys(queryParams).length) html+=`<div style="height:6px"></div>`;
                html+=`<div style="color:rgba(255,255,255,.2);font-size:8px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">POST Body</div>`;
                html+=Object.entries(bodyData).map(([k,v])=>`<div><span style="color:#7eb8ff;font-weight:600">${esc(k)}</span><span style="color:rgba(255,255,255,.22)">: </span><span style="color:rgba(255,255,255,.7)">${esc(typeof v==='object'?JSON.stringify(v):String(v))}</span></div>`).join('');
            }
            if(hasBodyStr) html+=`<pre style="margin:0;color:rgba(255,255,255,.7);white-space:pre-wrap;word-break:break-all">${esc(String(bodyData))}</pre>`;
            html+=`</div></div></div>`;
        }

        html += '</div>';
        return `<tr class="detail-row"><td colspan="16">${html}</td></tr>`;
    }

    let openId    = null;
    let lastData  = [];
    let cbSearchQ = '';
    let cbPageSize= 20;
    let cbPage    = 1;
    let cbFiltered= [];

    function cbApplySearch() { cbSearchQ=document.getElementById('cb-search').value.toLowerCase(); cbPage=1; openId=null; renderTable(lastData); }
    function cbChangePageSize() { cbPageSize=parseInt(document.getElementById('cb-pagesize').value)||0; cbPage=1; openId=null; renderTable(lastData); }
    function cbSetPage(p) { cbPage=p; renderTable(lastData); }
    function cbFilterBy(val) { var s=document.getElementById('cb-search'); s.value=val; cbApplySearch(); }

    function cbBuildPagination(total) {
        const info=document.getElementById('cb-pg-info'), pages=document.getElementById('cb-pg-pages');
        pages.innerHTML='';
        if (!info||!pages) return;
        if (cbPageSize===0){ info.textContent=total+' entries'; return; }
        const tp=Math.ceil(total/cbPageSize);
        const from=(cbPage-1)*cbPageSize+1, to=Math.min(cbPage*cbPageSize,total);
        info.textContent=total?from+'–'+to+' of '+total:'No results';
        if (tp<=1) return;
        const addBtn=(lbl,p,active,dis)=>{ const b=document.createElement('button'); b.className='cb-pg-btn'+(active?' active':''); b.textContent=lbl; b.disabled=dis; if(!dis&&!active)b.onclick=()=>cbSetPage(p); pages.appendChild(b); };
        addBtn('‹',cbPage-1,false,cbPage===1);
        const range=[];
        for(let p=1;p<=tp;p++){ if(p===1||p===tp||(p>=cbPage-2&&p<=cbPage+2))range.push(p); else if(range[range.length-1]!=='…')range.push('…'); }
        range.forEach(p=>{ if(p==='…'){ const sp=document.createElement('span'); sp.className='cb-pg-ellipsis'; sp.textContent='…'; pages.appendChild(sp); } else addBtn(p,p,p===cbPage,false); });
        addBtn('›',cbPage+1,false,cbPage===tp);
    }
