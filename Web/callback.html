    /* ── Dealer badge ── */
    function dealerBadge(dlRaw) {
        const dl = (dlRaw || '').toUpperCase();
        const sp = (bg,color,txt,title) =>
            `<span style="display:inline-block;padding:1px 5px;border-radius:2px;background:${bg};color:${color};font-size:9px;font-weight:700;letter-spacing:.05em" title="${esc(title||txt)}">${txt}</span>`;
        if (dl === '5ELG.DEALER')  return sp('rgba(126,184,255,.15)','#7eb8ff','5ELG');
        if (dl === 'WS-REQUEST')   return sp('rgba(196,176,255,.15)','#c4b0ff','WEBSOCKET');
        if (dl === 'HTTP.LOG')     return sp('rgba(62,207,142,.12)','#3ecf8e','HTTP/S');
        if (dl.endsWith('DNS.LOG'))return sp('rgba(79,142,247,.15)','#7eb8ff','DNS SERVER');
        if (/SHORT|TRACKER|URL.TRACK/.test(dl)) return sp('rgba(255,208,112,.15)','#ffd070','IP LOGGER', dlRaw);
        if (dl.includes('PHP-PROXY') || dl.includes('PHP.PROXY')) return sp('rgba(196,176,255,.12)','#ce93d8','PHP PROXY', dlRaw);
        if (dl.includes('JSP-PROXY') || dl.includes('JSP.PROXY')) return sp('rgba(196,176,255,.12)','#80cbc4','JSP PROXY', dlRaw);
        if (dl.includes('ASP-PROXY') || dl.includes('ASP.PROXY')) return sp('rgba(196,176,255,.12)','#a5d6a7','ASP PROXY', dlRaw);
        if (dl.includes('-PROXY'))  return sp('rgba(196,176,255,.12)','#ce93d8','PROXY', dlRaw);
        if (dl.includes('XSS'))    return sp('rgba(0,229,255,.12)','#00e5ff','XSS', dlRaw);
        if (dl.includes('STEALER'))return sp('rgba(239,83,80,.15)','#ef5350','STEALER', dlRaw);
        if (dl.includes('IMG'))   return sp('rgba(255,235,59,.12)','#ffeb3b','IMG-PING', dlRaw);
        // generic: show raw name with subtle styling
        return `<span style="font-size:9px;color:white;background:rgba(255,255,255,.05);padding:1px 5px;border-radius:2px" title="${esc(dlRaw)}">${esc(dlRaw||'—')}</span>`;
    }


    function renderTable(data) {
        const fHttp         = document.querySelector('[name="httpcheck"]').checked;
        const fWs           = document.querySelector('[name="wscheck"]').checked;
        const fDns          = document.querySelector('[name="dnscheck"]').checked;
        const fIcmp         = document.querySelector('[name="icmpcheck"]').checked;
        const fFu           = document.querySelector('[name="fucheck"]').checked;
        const fNoFu         = document.querySelector('[name="nofucheck"]').checked;
        const fHuman        = document.querySelector('[name="humancheck"]').checked;
        const fBotMaybe     = document.querySelector('[name="botmaybecheck"]').checked;
        const fBotConfirm   = document.querySelector('[name="botconfirmcheck"]').checked;
        const fProxy        = document.querySelector('[name="proxycheck"]').checked;
        const fImgPing      = document.querySelector('[name="imgpingcheck"]').checked;
        const fCustom       = document.querySelector('[name="customcheck"]').checked;
        const anyDealerPill = fProxy||fImgPing||fCustom;
        const fIpIn         = true;
        const fIpOut        = true;

        let total=0, sHuman=0, sBotMaybe=0, sBot=0;
        cbFiltered=[];

        data.forEach(log=>{
            const req=parseReq(log.Er);
            const proto=getProto(log,req);
            const botLevel=classifyBot(log,req);
            const fu=hasFu(log);
            total++;
            if (proto==='http'){
                if (botLevel==='human') sHuman++;
                else if (botLevel==='likely') sBotMaybe++;
                else sBot++;
            }
            // Proto filter
            if (proto==='http'&&!fHttp) return;
            if (proto==='ws'&&!fWs) return;
            if (proto==='dns'&&!fDns) return;
            if (proto==='icmp'&&!fIcmp) return;
            // Fingerprint filter
            if (fu&&!fFu) return;
            if (!fu&&!fNoFu) return;
            // Bot filter (HTTP only for classification)
            if (proto==='http'||proto==='ws') {
                if (botLevel==='human'&&!fHuman) return;
                if (botLevel==='likely'&&!fBotMaybe) return;
                if (botLevel==='bot'&&!fBotConfirm) return;
            }

            // Dealer type filter
            if (anyDealerPill) {
                const dl=(log.Dl||'').toUpperCase();
                const isProxy=dl.includes('PROXY');
                const isImg=dl.includes('IMG');
                const builtins=['5ELG.DEALER','WS-REQUEST','HTTP.LOG','DNS.LOG','ICMP.LOG'];
                const isCustom=!isProxy&&!isImg&&!builtins.some(b=>dl.includes(b));
                if (!(fProxy&&isProxy)&&!(fImgPing&&isImg)&&!(fCustom&&isCustom)) return;
            }

            // Search
            if (cbSearchQ) {
                const searchStr=[log.Ip||'',log.Fu||'',log.Dl||'',log.Ua||'',req.url||req.requestURL||'',log.Fr||''].join(' ').toLowerCase();
                if (!searchStr.includes(cbSearchQ)) return;
            }
            cbFiltered.push({log,req,proto,botLevel,fu});
        });

        const filtTotal=cbFiltered.length;
        const page=cbPageSize===0?cbFiltered:cbFiltered.slice((cbPage-1)*cbPageSize,cbPage*cbPageSize);

        const countEl=document.getElementById('cb-count');
        if (countEl) countEl.textContent=filtTotal+' shown · '+total+' total';
        cbBuildPagination(filtTotal);

        const tbody=document.querySelector('#logsTable tbody');
        tbody.innerHTML='';

        page.forEach(({log,req,proto,botLevel,fu})=>{
            const method=req.method||(proto==='dns'?'DNS':proto==='icmp'?'ICMP':'GET');
            const isOpen=openId===log.ID;
            const lang=detectLang(log,req);
            const rowCls=['log-row', isOpen?'r-open':'', (botLevel==='bot'&&(proto==='http'||proto==='ws'))?'r-bot-dim':''].filter(Boolean).join(' ');
            const rawLen=(()=>{ try{ const r=atob(log.Er||''); return r.length>1024?(r.length/1024).toFixed(1)+'K':r.length+'b'; }catch(_){return '—';} })();

            const tr=document.createElement('tr');
            tr.className=rowCls;
            tr.dataset.id=log.ID;

            // IP intel dot — render placeholder, check async
            const ipc=_ipCache[log.Ip];
            if (log.Ip && !_geoCache[log.Ip]) { setTimeout(()=>fetchGeo(log.Ip), 0); }
            let ipDotHtml;
            if (ipc?.status==='known') ipDotHtml=`<span class="ip-known" title="In Intel DB">●</span>`;
            else if (ipc?.status==='unknown') ipDotHtml=`<span class="ip-unknown" title="Not in DB">●</span>`;
            else ipDotHtml=`<span class="ip-loading" title="Checking…">●</span>`;

            tr.innerHTML=`
                <td class="col-arrow"><span class="r-arrow">&#9658;</span></td>
                <td class="col-id"><a href="/web/info?id=${esc(log.Fr)}" onclick="event.stopPropagation()" style="color:rgba(255,255,255,.5)">${log.ID||'#'}</a></td>
                <td class="col-ip" title="${(_geoCache[log.Ip]&&_geoCache[log.Ip]!=='loading')?_geoCache[log.Ip].city+', '+_geoCache[log.Ip].country:''}">${(_geoCache[log.Ip]&&_geoCache[log.Ip]!=='loading'&&_geoCache[log.Ip].flag)?_geoCache[log.Ip].flag:''}<span class="ip-link" onclick="event.stopPropagation();addIPtoOsint('${esc(log.Ip)}')" title="${(_geoCache[log.Ip]&&_geoCache[log.Ip]!=='loading')?_geoCache[log.Ip].city+' '+_geoCache[log.Ip].country:log.Ip}">${esc(log.Ip||'—')}</span></td>
                <td class="col-proto" style="text-align:center">${protoBadge(proto)}</td>
                <td class="col-method" style="text-align:center">${methodBadge(proto,method)}</td>
                <td class="col-ua">${truncateUA(log.Ua,40,log)}</td>
                <td class="col-len" style="font-size:10px;color:rgba(255,255,255,.45);font-family:monospace">${rawLen}</td>
                <td class="col-ts"><span class="ts-val" style="white-space:nowrap">${fmtTime(log.Ts)}</span></td>
                <td class="col-dl">${dealerBadge(log.Dl)}</td>
                <td class="col-fu-hash">${(()=>{
                const isDns = proto==='dns';
                const looksLikeDomain = isDns && log.Fu && /[a-z]/i.test(log.Fu) && log.Fu.includes('.');
                if(looksLikeDomain) return '<span style="font-family:Consolas,monospace;font-size:9px;color:rgba(255,255,255,.2)">DNS</span>';
                return fu?`<a href="/web/statics?finger=${log.Fu}" target="_blank" onclick="event.stopPropagation()" style="font-family:Consolas,monospace;font-size:9px;color:#7eb8ff;text-decoration:underline dotted rgba(126,184,255,.35);text-underline-offset:2px" title="${esc(log.Fu||'')}">${log.Fu.slice(0,26)}…</a>`:'<span style="font-family:Consolas,monospace;font-size:9px;color:rgba(255,255,255,.18)">—</span>';
            })()}</td>
                <td class="col-params" style="text-align:center">${(()=>{const hp=!!(req.body&&Object.keys(req.body||{}).length)||!!(req.params&&Object.keys(req.params||{}).length)||(req.url&&req.url.includes('?'));return hp?'<span title="Has params" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#5fffb0;opacity:.85"></span>':'<span title="No params" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:rgba(255,80,80,.28)"></span>';})()}</td>
                <td class="col-bot" style="text-align:center">${botIcon(botLevel)}</td>
                <td class="col-os" style="text-align:center">${deviceIcon(log.Ua)}</td>
                <td class="col-br" style="text-align:center">${browserIcon(log.Ua)}</td>
                <td class="col-threat">${threatBadge(log.Ip)}</td>
            `;

            // Async IP check
            if (log.Ip && !ipc) {
                const tdEl=tr.querySelector(`#ipdot-${log.ID}`);
                setTimeout(()=>checkIpIntel(log.Ip,tdEl),0);
            }

            tr.addEventListener('click',()=>{ openId=(openId===log.ID)?null:log.ID; renderTable(lastData); });
            tbody.appendChild(tr);

            if (isOpen) {
                const tmp=document.createElement('tbody');
                tmp.innerHTML=buildDetail(log,req,proto,botLevel);
                tmp.querySelectorAll('tr').forEach(r=>tbody.appendChild(r));
            }
        });

        document.getElementById('s-total').textContent=total;
        document.getElementById('s-human').textContent=sHuman;
        document.getElementById('s-botmaybe').textContent=sBotMaybe;
        document.getElementById('s-bot').textContent=sBot;

        initColResize();
    }

    /* ══════════════════════════════════════════
       TRAFFIC CHART
    ══════════════════════════════════════════ */
    function drawTrafficChart(data) {
        const canvas = document.getElementById('traffic-chart');
        if (!canvas || !canvas.getContext) return;
        const W = canvas.offsetWidth || canvas.parentElement?.clientWidth || 800;
        const PH = 80, LH = 14, H = PH + LH;
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, W, H);

        const BUCKETS = 60, BUCKET_MS = 60000;
        const now = Date.now();
        const bkts = Array.from({length: BUCKETS}, () => ({h:0,l:0,b:0,dns:0,ws:0,icmp:0}));

        data.forEach(log => {
            const ts = new Date(log.Ts).getTime();
            if (isNaN(ts)) return;
            const age = now - ts;
            if (age < 0 || age > BUCKETS * BUCKET_MS) return;
            const bi = BUCKETS - 1 - Math.floor(age / BUCKET_MS);
            if (bi < 0 || bi >= BUCKETS) return;
            const req = parseReq(log.Er);
            const proto = getProto(log, req);
            if (proto === 'dns')  { bkts[bi].dns++;  return; }
            if (proto === 'icmp') { bkts[bi].icmp++; return; }
            if (proto === 'ws')   { bkts[bi].ws++;   return; }
            const bot = classifyBot(log, req);
            if (bot === 'human') bkts[bi].h++;
            else if (bot === 'likely') bkts[bi].l++;
            else bkts[bi].b++;
        });

        const maxV = Math.max(1, ...bkts.map(b => b.h + b.l + b.b + b.dns + b.ws + b.icmp));
        const bw = W / BUCKETS;

        // Subtle grid lines
        ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
        [0.25, 0.5, 0.75].forEach(f => {
            const y = Math.round(PH - f * PH) + 0.5;
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
        });

        bkts.forEach((b, i) => {
            let y = PH;
            const x = i * bw;
            const draw = (n, col) => {
                if (!n) return;
                const bh = (n / maxV) * PH; y -= bh;
                ctx.fillStyle = col;
                ctx.fillRect(x + 0.5, y, Math.max(1, bw - 1), bh);
            };
            draw(b.h,    'rgba(95,255,176,0.65)');
            draw(b.l,    'rgba(255,208,112,0.65)');
            draw(b.b,    'rgba(255,112,112,0.65)');
            draw(b.dns,  'rgba(79,142,247,0.65)');
            draw(b.ws,   'rgba(196,176,255,0.65)');
            draw(b.icmp, 'rgba(240,164,41,0.65)');
        });

        // Tick marks + time labels
        [0, 15, 30, 45, 60].forEach(i => {
            const x = Math.round(i * bw);
            ctx.fillStyle = 'rgba(255,255,255,0.06)';
            ctx.fillRect(x, 0, 1, PH);
            const minsAgo = BUCKETS - i;
            const lbl = minsAgo === 0 ? 'now' : `-${minsAgo}m`;
            ctx.fillStyle = 'rgba(255,255,255,0.18)';
            ctx.font = '8px Consolas, monospace';
            ctx.textAlign = minsAgo === 0 ? 'right' : 'left';
            ctx.fillText(lbl, minsAgo === 0 ? W - 2 : x + 2, H - 3);
        });
    }

    /* ══════════════════════════════════════════
       FETCH + POLL
    ══════════════════════════════════════════ */
    function fetchLogs() {
        fetch('/api/last7')
            .then(r=>r.json())
            .then(data=>{ lastData=data; renderTable(data); drawTrafficChart(data); })
            .catch(err=>console.error(err));
    }

    /* ══════════════════════════════════════════
       COL RESIZE
    ══════════════════════════════════════════ */
    function initColResize() {
        document.querySelectorAll('#logsTable thead th').forEach(th=>{
            if (th.querySelector('.col-resizer')) return;
            const cls=th.className;
            if (!cls||cls.includes('col-arrow')||cls.includes('col-fu')||cls.includes('col-bot')||cls.includes('col-ipin')) return;
            const handle=document.createElement('div');
            handle.className='col-resizer';
            th.appendChild(handle);
            let startX,startW;
            handle.addEventListener('mousedown',e=>{ e.preventDefault(); e.stopPropagation(); startX=e.clientX; startW=th.offsetWidth; handle.classList.add('resizing');
                const onMove=e2=>th.style.width=Math.max(30,startW+e2.clientX-startX)+'px';
                const onUp=()=>{ handle.classList.remove('resizing'); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
                document.addEventListener('mousemove',onMove); document.addEventListener('mouseup',onUp);
            });
            handle.addEventListener('click',e=>e.stopPropagation());
        });
    }

    /* ══════════════════════════════════════════
       ACTIONS
    ══════════════════════════════════════════ */
    function addIPtoOsint(ip) {
        Swal.fire({title:'Checking IP…',icon:'info',showConfirmButton:false,allowOutsideClick:false,didOpen:()=>Swal.showLoading()});
        $.ajax({ url:'/api/ips/check', type:'POST', contentType:'application/json', data:JSON.stringify({IP:ip}),
            success:function(data){ Swal.close();
                if (data&&data.ipEntry&&data.ipEntry.ID) {
                    Swal.fire({title:'OSINT Result',text:`IP ${ip} processed. View details?`,icon:'success',showCancelButton:true,confirmButtonText:'View',cancelButtonText:'Close'})
                    .then(r=>{ if(r.isConfirmed)window.location.href=`/web/ipdata?id=${data.ipEntry.ID}`; });
                } else Swal.fire('Error','No data found.','error');
            }, error:()=>Swal.fire('Error','Failed to check the IP.','error') });
    }

    async function showUserDataCb(fu) {
        if (!fu||fu==='N/B'||fu==='') { Swal.fire({icon:'info',title:'No Fu',text:'No fingerprint for this request.'}); return; }
        Swal.fire({title:'Loading…',allowOutsideClick:false,didOpen:()=>Swal.showLoading()});
        try {
            const res=await fetch('/api/getfinger/'+fu);
            if (!res.ok) throw new Error('HTTP '+res.status);
            const data=await res.json();
            if (!data||data.length===0){ Swal.fire({icon:'info',title:'No Data',text:'No user data for this fingerprint.'}); return; }
            const grouped=data.reduce((acc,e)=>{ if(!acc[e.FB])acc[e.FB]={FB:e.FB,analysis:[],files:[]}; if(e.PWD){try{JSON.parse(e.PWD).forEach(p=>{ if(p.links&&p.links.length)acc[e.FB].files.push('<b>🔗 Links:</b> '+p.links.join(', ')); if(p.jsFiles&&p.jsFiles.length)acc[e.FB].files.push('<b>📜 JS:</b> '+p.jsFiles.join(', ')); });}catch(_){}} if(e.INTEL){try{const a=JSON.parse(e.INTEL);if(Array.isArray(a))a.forEach(x=>{let h='';if(x.emails&&x.emails.length)h+='<b>📧 Emails:</b> '+x.emails.join(', ')+'<br>';if(x.jwtTokens&&x.jwtTokens.length)h+='<b>🔐 JWT:</b> '+x.jwtTokens.join(', ')+'<br>';if(x.apiKs&&Object.keys(x.apiKs).length)h+='<b>🔑 API Keys:</b> '+JSON.stringify(x.apiKs)+'<br>';if(h)acc[e.FB].analysis.push(h);});}catch(_){}} return acc;},{});
            const seenA=new Set(),seenF=new Set(),allA=[],allF=[];
            Object.values(grouped).forEach(g=>{ g.analysis.forEach(i=>{const k=i.trim();if(k&&!seenA.has(k)){seenA.add(k);allA.push(i);}}); g.files.forEach(i=>{const k=i.trim();if(k&&!seenF.has(k)){seenF.add(k);allF.push(i);}}); });
            const thS='padding:5px 8px;text-align:left;font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.1)';
            const tdS='padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.06);vertical-align:top;font-size:12px';
            let html=`<table style="width:100%;border-collapse:collapse"><thead><tr><th style="${thS}"></th><th style="${thS}"></th></tr></thead><tbody>`;
            html+=`<tr><td style="${tdS}">${allA.join('<hr style="border:none;border-top:1px solid rgba(255,255,255,.06);margin:5px 0">')||'<span style="color:rgba(255,255,255,.25)">No data</span>'}</td><td style="${tdS}">${allF.join('<br>')||'<span style="color:rgba(255,255,255,.25)">No files</span>'}</td></tr>`;
            html+='</tbody></table>';
            Swal.fire({title:'User Data · '+fu.slice(0,16)+'…',html,width:'80%',confirmButtonText:'Close'});
        } catch(e){ Swal.fire({icon:'error',title:'Error',text:e.message}); }
    }

    function banIp(ip,btn) {
        if (!ip) return;
        Swal.fire({title:'Ban IP?',html:`Block <b style="color:#ff8080">${ip}</b>?`,icon:'warning',showCancelButton:true,confirmButtonText:'BAN'})
        .then(async r=>{ if(!r.isConfirmed)return;
            try{ const res=await fetch('/api/ips/ban',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({IP:ip})});
            if(!res.ok)throw new Error('HTTP '+res.status);
            if(btn){const o=btn.textContent;btn.textContent='✓ BANNED';btn.style.color='#ff8080';setTimeout(()=>{btn.textContent=o;btn.style.color='';},2000);}
            Swal.fire({icon:'success',title:'Banned',text:ip+' banned.',timer:1500,showConfirmButton:false});
            }catch(e){Swal.fire({icon:'error',title:'Error',text:'Failed: '+e.message});} });
    }

    function unbanIp(ip,btn) {
        if (!ip) return;
        fetch('/api/ips/unban',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({IP:ip})})
        .then(r=>{ if(!r.ok)throw new Error('HTTP '+r.status);
            if(btn){const o=btn.textContent;btn.textContent='✓ UNBANNED';btn.style.color='#5fffb0';setTimeout(()=>{btn.textContent=o;btn.style.color='';},2000);}
            Swal.fire({icon:'success',title:'Unbanned',timer:1500,showConfirmButton:false});
        }).catch(e=>Swal.fire({icon:'error',title:'Error',text:'Failed: '+e.message}));
    }

    /* ══════════════════════════════════════════
       BOOT
    ══════════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded',()=>{
        document.querySelectorAll('.fpill').forEach(pill=>{
            pill.addEventListener('click',()=>{ pill.classList.toggle('on',pill.querySelector('input').checked); cbPage=1; renderTable(lastData); });
        });
        initIpData();
        fetchLogs();
        setInterval(fetchLogs,1000);
        initColResize();
    });
